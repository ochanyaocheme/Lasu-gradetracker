<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASU GradeTracker - Your Campus, Online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a192f;
            color: #e6f1ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        /* Logo Section */
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-container img {
            width: 150px;
            height: auto;
            border-radius: 50%;
            border: 3px solid #f4a261;
        }
        /* Title Section */
        .title-section {
            text-align: center;
            margin-bottom: 40px;
        }
        .title-section h1 {
            font-size: 42px;
            font-weight: 700;
            color: #f4a261;
            margin-bottom: 5px;
        }
        .title-section h1 span {
            color: #e6f1ff;
        }
        .tagline {
            font-size: 18px;
            color: #8892b0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }
        .tagline::before,
        .tagline::after {
            content: '';
            width: 40px;
            height: 1px;
            background-color: #f4a261;
        }
        /* Buttons */
        .button-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 25px;
            border-radius: 16px;
            text-decoration: none;
            color: #0a192f;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(244, 162, 97, 0.3);
        }
        .btn-green {
            background-color: #2a9d8f;
            color: white;
        }
        .btn-gold {
            background-color: #f4a261;
            color: #0a192f;
        }
        .btn-coral {
            background-color: #e07a5f;
            color: white;
        }
        .btn-icon {
            font-size: 24px;
        }
        .btn-text {
            flex-grow: 1;
            text-align: left;
            margin-left: 15px;
        }
        .btn-arrow {
            font-size: 20px;
        }
        /* Stats Card */
        .stats-card {
            background-color: #112240;
            border-radius: 16px;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 400px;
        }
        .stats-icon {
            font-size: 30px;
        }
        .stats-number {
            font-size: 36px;
            font-weight: 700;
            color: #f4a261;
        }
        .stats-label {
            font-size: 14px;
            color: #8892b0;
        }
        /* Footer */
        .footer {
            text-align: center;
            margin-top: auto;
            padding-bottom: 30px;
        }
        .gate-watermark {
            width: 100%;
            max-width: 500px;
            opacity: 0.08;
            margin-bottom: 20px;
        }
        .footer-text {
            font-size: 14px;
            color: #8892b0;
            line-height: 2;
        }
        .footer-text .founder {
            color: #e6f1ff;
        }
        .footer-text .heart {
            color: #e63946;
        }
        .footer-text .mission {
            color: #f4a261;
            font-weight: 600;
            letter-spacing: 2px;
            margin-top: 10px;
        }
        /* Responsive */
        @media (max-width: 480px) {
            .title-section h1 {
                font-size: 32px;
            }
            
            .btn {
                padding: 16px 20px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Logo -->
    <div class="logo-container">
        <img src="your-logo.png" alt="LASU GradeTracker Logo">
    </div>
    <!-- Title -->
    <div class="title-section">
        <h1>LASU <span>GradeTracker</span></h1>
        <div class="tagline">Your Campus, Online</div>
    </div>
    <!-- Buttons -->
    <div class="button-container">
        <a href="cgpa-calculator.html" class="btn btn-green">
            <span class="btn-icon">📊</span>
            <span class="btn-text">Calculate My CGPA</span>
            <span class="btn-arrow">›</span>
        </a>
        <a href="lounge.html" class="btn btn-gold">
            <span class="btn-icon">🚪</span>
            <span class="btn-text">Enter Lounge</span>
            <span class="btn-arrow">›</span>
        </a>
        <a href="ochanya-corner.html" class="btn btn-coral">
            <span class="btn-icon">💬</span>
            <span class="btn-text">Ochanya's Corner</span>
            <span class="btn-arrow">›</span>
        </a>
    </div>
    <!-- Stats -->
    <div class="stats-card">
        <span class="stats-icon">👥</span>
        <div>
            <div class="stats-number">247</div>
            <div class="stats-label">LASUites here now</div>
        </div>
    </div>
    <!-- Footer -->
    <div class="footer">
        <img src="lasu-gate.png" alt="LASU Gate" class="gate-watermark">
        
        <div class="footer-text">
            <div class="founder">
                Founded by Ocheme Faith Ochanya • Chemistry • LASU
            </div>
            <div>
                Built with <span class="heart">♥️</span> by a LASUite, for LASUites
            </div>
            <div class="mission">
                CONNECT • LEARN • SUCCEED
            </div>
        </div>
    </div>
</body>
  </html>
