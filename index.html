<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASU GradeTracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0f172a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px;
        }
        .logo-container {
            margin-top: 20px;
            margin-bottom: 8px;
        }
        .logo-container img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #f59e0b;
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.3);
        }
        .brand-title {
            font-size: 42px;
            font-weight: 800;
            color: #f59e0b;
            letter-spacing: 2px;
            margin-top: 4px;
        }
        .brand-subtitle {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            margin-top: -8px;
        }
        .tagline {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            margin-bottom: 32px;
        }
        .tagline-line {
            width: 60px;
            height: 2px;
            background: #f59e0b;
        }
        .tagline-text {
            font-size: 16px;
            color: #f59e0b;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .menu-grid {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }
        .menu-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
        }
        .menu-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .menu-card:active { transform: translateY(0); }
        .card-cgpa {
            background: #14b8a6;
        }
        .card-cgpa::after {
            content: '›';
            position: absolute;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 300;
            transition: all 0.3s ease;
        }
        .card-cgpa:hover::after {
            background: rgba(255,255,255,0.35);
            transform: translateX(4px);
        }
        .card-lounge {
            background: #f59e0b;
            color: #1a1a2e;
        }
        .card-lounge::after {
            content: '›';
            position: absolute;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.15);
            color: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 300;
            transition: all 0.3s ease;
        }
        .card-lounge:hover::after {
            background: rgba(0,0,0,0.25);
            transform: translateX(4px);
        }
        .card-corner {
            background: #ef4444;
        }
        .card-corner::after {
            content: '›';
            position: absolute;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 300;
            transition: all 0.3s ease;
        }
        .card-corner:hover::after {
            background: rgba(255,255,255,0.35);
            transform: translateX(4px);
        }
        .card-icon {
            font-size: 32px;
            width: 48px;
            text-align: center;
        }
        .card-content { flex: 1; }
        .card-title {
            font-size: 20px;
            font-weight: 700;
            display: block;
        }
        .join-section {
            width: 100%;
            max-width: 400px;
            background: #1e293b;
            border-radius: 20px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            margin-bottom: 40px;
            border: 2px solid transparent;
        }
        .join-section:hover {
            border-color: #f59e0b;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
        }
        .join-icon { font-size: 32px; }
        .join-text {
            font-size: 18px;
            font-weight: 600;
            color: #f59e0b;
        }
        .join-arrow {
            margin-left: auto;
            font-size: 20px;
            color: #f59e0b;
            transition: transform 0.3s ease;
        }
        .join-section:hover .join-arrow {
            transform: translateX(4px);
        }
        .footer {
            text-align: center;
            margin-top: auto;
            padding-bottom: 20px;
        }
        .footer-founder {
            font-size: 15px;
            color: #e2e8f0;
            margin-bottom: 6px;
        }
        .footer-tagline {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 12px;
        }
        .footer-motto {
            font-size: 16px;
            font-weight: 700;
            color: #f59e0b;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }
        .footer-year {
            font-size: 14px;
            color: #64748b;
            letter-spacing: 2px;
        }
        .heart { color: #ef4444; }
        @media (max-width: 480px) {
            .brand-title { font-size: 32px; }
            .brand-subtitle { font-size: 28px; }
            .menu-card { padding: 18px 20px; }
            .card-title { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="your-logo.png" alt="LASU GradeTracker Logo">
    </div>
    <div class="brand-title">LASU</div>
    <div class="brand-subtitle">GradeTracker</div>
    <div class="tagline">
        <div class="tagline-line"></div>
        <span class="tagline-text">Your Campus, Online</span>
        <div class="tagline-line"></div>
    </div>
    <div class="menu-grid">
        <a href="calculator.html" class="menu-card card-cgpa">
            <span class="card-icon">📊</span>
            <div class="card-content">
                <span class="card-title">Calculate My CGPA</span>
            </div>
        </a>
        <a href="lounge.html" class="menu-card card-lounge">
            <span class="card-icon">🚪</span>
            <div class="card-content">
                <span class="card-title">LASU Lounge</span>
            </div>
        </a>
        <a href="ochanyas-corner.html" class="menu-card card-corner">
            <span class="card-icon">💬</span>
            <div class="card-content">
                <span class="card-title">Ochanya's Corner</span>
            </div>
        </a>
    </div>
    <a href="join-community.html" class="join-section" id="joinCommunityBtn">
        <span class="join-icon">👥</span>
        <span class="join-text">Join the community</span>
        <span class="join-arrow">›</span>
    </a>
    <div class="footer">
        <div class="footer-founder">Founded by Ochanya Faith Ochanya • Chemistry • LASU</div>
        <div class="footer-tagline">Built with <span class="heart">♥️</span> by a LASUite, for LASUites</div>
        <div class="footer-motto">CONNECT • LEARN • SUCCEED</div>
        <div class="footer-year">Est. 2026</div>
    </div>
</body>
</html>
