<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASU GradeTracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #0d1b2a;
            color: #ffffff;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            overflow: hidden;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .logo-text {
            font-size: 3rem;
            font-weight: 900;
            color: #e9a319;
            letter-spacing: 2px;
        }
        .logo-text span {
            color: #ffffff;
        }
        .tagline {
            color: #e9a319;
            font-size: 0.9rem;
            margin-top: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .tagline-line {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
        }
        .tagline-line .line {
            flex: 1;
            height: 1px;
            background-color: #e9a319;
            opacity: 0.5;
        }
        .tagline-line span {
            color: #e9a319;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .menu-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        .menu-item {
            display: flex;
            align-items: center;
            padding: 22px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.2s;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .menu-item:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }
        .menu-item .icon {
            font-size: 2rem;
            margin-right: 18px;
            width: 45px;
            text-align: center;
        }
        .menu-item .text {
            flex: 1;
        }
        .menu-item .arrow {
            font-size: 1.5rem;
            opacity: 0.7;
        }
        .menu-cgpa {
            background-color: #1b998b;
        }
        .menu-lounge {
            background-color: #e9a319;
            color: #0d1b2a;
        }
        .menu-lounge .arrow {
            color: #0d1b2a;
        }
        .menu-corner {
            background-color: #e85d4e;
        }
        .community-box {
            width: 100%;
            background-color: #162236;
            border-radius: 16px;
            padding: 18px;
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            border: 2px solid transparent;
        }
        .community-box:hover {
            border-color: #e9a319;
            transform: translateY(-2px);
        }
        .community-box .icon {
            font-size: 1.5rem;
        }
        .community-box span {
            color: #e9a319;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .footer {
            text-align: center;
            color: #8899b0;
            font-size: 0.8rem;
            line-height: 1.8;
        }
        .footer .founder {
            color: #ffffff;
            margin-bottom: 5px;
        }
        .footer .heart {
            color: #e85d4e;
        }
        .footer .motto {
            color: #e9a319;
            font-weight: 700;
            letter-spacing: 3px;
            margin-top: 8px;
            font-size: 0.85rem;
        }
        .footer .est {
            color: #4a5d7a;
            margin-top: 5px;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo">
                <img src="your-logo.png" alt="LASU GradeTracker Logo">
            </div>
            <div class="logo-text">LASU<br><span>GradeTracker</span></div>
            <div class="tagline-line">
                <div class="line"></div>
                <span>Your Campus, Online</span>
                <div class="line"></div>
            </div>
        </div>

        <div class="menu-list">
            <a href="calculator.html" class="menu-item menu-cgpa">
                <span class="icon">📊</span>
                <span class="text">Calculate My CGPA</span>
                <span class="arrow">›</span>
            </a>
            <a href="lounge.html" class="menu-item menu-lounge">
                <span class="icon">💬</span>
                <span class="text">LASU Lounge</span>
                <span class="arrow">›</span>
            </a>
            <a href="ochanya-corner.html" class="menu-item menu-corner">
                <span class="icon">📝</span>
                <span class="text">Ochanya's Corner</span>
                <span class="arrow">›</span>
            </a>
        </div>

        <a href="signup.html" class="community-box">
            <span class="icon">👥</span>
            <span>Join the Community</span>
        </a>

        <div class="footer">
            <div class="founder">Founded by Ochene Faith Ochanya · Chemistry · LASU</div>
            <div>Built with <span class="heart">❤</span> by a LASUite, for LASUites</div>
            <div class="motto">CONNECT · LEARN · SUCCEED</div>
            <div class="est">Est. 2026</div>
        </div>
    </div>
</body>
</html>
