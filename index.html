<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASU GradeTracker - Your Campus, Online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #0d1b2a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 20px 20px;
            width: 100%;
            flex: 1;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid #e9a319;
        }
        .title {
            font-size: 2.8rem;
            font-weight: 700;
            color: #e9a319;
            margin-bottom: 8px;
            line-height: 1.1;
        }
        .title .white {
            color: #ffffff;
        }
        .tagline {
            font-size: 1rem;
            color: #e9a319;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }
        .tagline::before,
        .tagline::after {
            content: '';
            width: 60px;
            height: 1px;
            background-color: #e9a319;
        }
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 35px 0;
        }
        .menu-btn {
            display: flex;
            align-items: center;
            padding: 22px 24px;
            border-radius: 18px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 1.15rem;
            transition: transform 0.2s;
        }
        .menu-btn:active {
            transform: scale(0.98);
        }
        .menu-btn .icon {
            font-size: 1.8rem;
            margin-right: 18px;
            width: 40px;
            text-align: center;
        }
        .menu-btn .arrow-circle {
            margin-left: auto;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .btn-cgpa {
            background-color: #1b998b;
        }
        .btn-lounge {
            background-color: #e9a319;
            color: #0d1b2a;
        }
        .btn-lounge .arrow-circle {
            background-color: rgba(0,0,0,0.15);
            color: #0d1b2a;
        }
        .btn-corner {
            background-color: #e85d4e;
        }
        .community-section {
            background-color: #162236;
            border-radius: 18px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .community-icon {
            font-size: 2rem;
        }
        .community-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: #e9a319;
        }
        .footer {
            text-align: center;
            padding: 30px 15px 25px;
            background-color: #0d1b2a;
            position: relative;
            overflow: hidden;
        }
        .gate-bg {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120%;
            height: 65%;
            object-fit: cover;
            object-position: center 60%;
            opacity: 0.18;
            z-index: 0;
        }
        .footer-content {
            position: relative;
            z-index: 1;
        }
        .founder {
            font-size: 0.8rem;
            color: #ffffff;
            margin-bottom: 8px;
        }
        .built-with {
            font-size: 0.75rem;
            color: #8899b0;
            margin-bottom: 8px;
        }
        .built-with span {
            color: #e85d4e;
        }
        .mission {
            font-size: 0.8rem;
            color: #e9a319;
            letter-spacing: 3px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .est {
            font-size: 0.7rem;
            color: #8899b0;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <img src="your-logo.png" alt="LASU GradeTracker Logo" class="logo">
            <h1 class="title">LASU<br><span class="white">GradeTracker</span></h1>
            <p class="tagline">Your Campus, Online</p>
        </div>

        <div class="menu-grid">
            <a href="calculator.html" class="menu-btn btn-cgpa">
                <span class="icon">📊</span>
                <span>Calculate My CGPA</span>
                <span class="arrow-circle">›</span>
            </a>
            <a href="lounge.html" class="menu-btn btn-lounge">
                <span class="icon">🚪</span>
                <span>Enter Lounge</span>
                <span class="arrow-circle">›</span>
            </a>
            <a href="ochanyas-corner.html" class="menu-btn btn-corner">
                <span class="icon">💬</span>
                <span>Ochanya's Corner</span>
                <span class="arrow-circle">›</span>
            </a>
        </div>

        <div class="community-section">
            <span class="community-icon">👥</span>
            <span class="community-text">Join the community</span>
        </div>
    </div>

    <div class="footer">
        <img src="lasu-gate.png" alt="LASU Gate" class="gate-bg">
        <div class="footer-content">
            <div class="founder">Founded by Ocheme Faith Ochanya • Chemistry • LASU</div>
            <div class="built-with">Built with <span>❤</span> by a LASUite, for LASUites</div>
            <div class="mission">CONNECT • LEARN • SUCCEED</div>
            <div class="est">Est. 2026</div>
        </div>
    </div>
</body>
</html>
