<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LASU GradeTracker - General Chat</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent}
body{background-color:#0f172a;color:#fff}
::-webkit-scrollbar{width:0;height:0}
@keyframes slide-up{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fade-in{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.animate-slide-up{animation:slide-up .3s ease-out}
.animate-fade-in{animation:fade-in .2s ease-out}
.tab-active{color:#f59e0b!important;background:rgba(245,158,11,.12)!important}
.tab-inactive{color:#64748b}
.tab-inactive:hover{color:#f59e0b;background:rgba(255,255,255,.03)}
.post-card{transition:border-color .2s ease}
.post-card:hover{border-color:rgba(245,158,11,.15)}
.action-btn{transition:all .15s ease}
.action-btn:active{transform:scale(.92)}
.avatar-hover{transition:box-shadow .2s ease}
.avatar-hover:hover{box-shadow:0 0 0 2px rgba(245,158,11,.4)}
.badge-wrap{position:relative}
.badge-wrap:hover .badge-tooltip{opacity:1;visibility:visible;transform:translateY(0)}
.badge-tooltip{position:absolute;bottom:140%;left:50%;transform:translateX(-50%) translateY(4px);background:#1e293b;border:1px solid rgba(255,255,255,.1);padding:6px 12px;border-radius:10px;font-size:11px;white-space:nowrap;opacity:0;visibility:hidden;transition:all .2s ease;z-index:10;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.badge-tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1e293b}
.profile-tab-active{color:#f59e0b!important;background:rgba(245,158,11,.1)!important}
.profile-tab-inactive{color:#64748b}
.profile-tab-inactive:hover{color:#94a3b8;background:rgba(255,255,255,.03)}
</style>
</head>
<body class="min-h-screen bg-[#0f172a] text-white antialiased">

<header class="sticky top-0 z-50 bg-[#0f172a] border-b border-white/8 px-4 py-3 flex items-center gap-3">
  <!-- Home Button styled like the attached image -->
  <button onclick="goToLounge()" class="flex items-center gap-3 p-1 -ml-1 rounded-xl hover:bg-white/5 active:bg-white/10 transition-all group">
    <div class="w-9 h-9 bg-[#1e40af] rounded-2xl flex items-center justify-center border border-white/20 shadow-inner group-active:scale-95 transition-transform">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.75">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1v-5m10-10l2 2m-2-2v10a1 1 0 01-1 1v-5m-6 0a1 1 0 001-1v5" />
      </svg>
    </div>
    <div class="flex items-center gap-2.5">
      <div class="w-9 h-9 bg-black rounded-xl flex items-center justify-center border border-amber-500/30 overflow-hidden shadow-sm">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=lasu" class="w-7 h-7" alt="LASU">
      </div>
      <div>
        <h1 class="text-[17px] font-bold leading-tight tracking-tight">
          <span class="text-amber-400">LASU</span> 
          <span class="text-white">GradeTracker</span>
        </h1>
      </div>
    </div>
  </button>

  <div class="ml-auto flex items-center gap-3">
    <button class="relative p-1.5 rounded-full hover:bg-white/5 active:bg-white/10 transition" aria-label="Notifications">
      <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
      <span class="absolute top-0.5 right-0.5 w-2 h-2 bg-red-500 rounded-full border-2 border-[#0f172a]"></span>
    </button>
    <button onclick="openProfile(0)" class="rounded-full" aria-label="My profile">
      <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=official" class="w-9 h-9 rounded-full border-2 border-red-500/50 cursor-pointer avatar-hover object-cover" alt="My Profile">
    </button>
  </div>
</header>

<div class="px-4 pt-6 pb-1 text-center">
<h2 class="text-[28px] font-extrabold text-amber-400 flex items-center justify-center gap-2.5 tracking-tight">
<span class="text-2xl">&#128293;</span>
General Chat
</h2>
<p class="text-gray-400 text-[14px] mt-1.5">Chat with the whole LASU community</p>
</div>

<div class="mx-4 mt-5 bg-[#1e293b] rounded-2xl border border-white/8 p-4">
<div class="flex gap-3">
<img src="https://api.dicebear.com/7.x/avataaars/svg?seed=official" class="w-10 h-10 rounded-full shrink-0 border border-white/8 object-cover" alt="Me">
<div class="flex-1">
<textarea id="postInput" placeholder="What's on your mind? Share with the community..." class="w-full bg-[#0f172a] rounded-xl px-4 py-3 text-[14px] text-white placeholder-gray-500 border border-white/8 focus:border-amber-500/50 focus:outline-none resize-none h-[72px] transition-all" oninput="togglePostBtn(this)"></textarea>
</div>
</div>
<div class="flex items-center justify-between mt-3 pt-3 border-t border-white/5">
<div class="flex items-center gap-1">
<button class="action-btn flex items-center gap-1.5 text-gray-400 hover:text-amber-400 text-[13px] font-medium px-3 py-2 rounded-lg hover:bg-white/5 transition" aria-label="Add photo">
<svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
Photo
</button>
<button class="action-btn flex items-center gap-1.5 text-gray-400 hover:text-amber-400 text-[13px] font-medium px-3 py-2 rounded-lg hover:bg-white/5 transition" aria-label="Add emoji">
<svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
Emoji
</button>
<button class="action-btn flex items-center gap-1.5 text-gray-400 hover:text-amber-400 text-[13px] font-medium px-3 py-2 rounded-lg hover:bg-white/5 transition" aria-label="Add tag">
<svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"/></svg>
Tag
</button>
</div>
<button onclick="createPost()" id="postBtn" class="action-btn bg-amber-500 hover:bg-amber-400 text-black font-bold text-[13px] px-5 py-2.5 rounded-xl flex items-center gap-1.5 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
<span class="text-lg leading-none">&#10148;</span>
Post
</button>
</div>
</div>

<div class="mx-4 mt-4 bg-[#1e293b] rounded-2xl border border-white/8 p-1.5">
<div class="flex items-center justify-around">
<button onclick="setFilter('all')" id="tab-all" class="tab-active flex flex-col items-center gap-1 py-2.5 px-5 rounded-xl transition-all duration-200" aria-label="All posts">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
<span class="text-[11px] font-semibold">All Posts</span>
</button>
<button onclick="setFilter('trending')" id="tab-trending" class="tab-inactive flex flex-col items-center gap-1 py-2.5 px-5 rounded-xl transition-all duration-200" aria-label="Trending posts">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"/></svg>
<span class="text-[11px] font-semibold">Trending</span>
</button>
<button onclick="setFilter('following')" id="tab-following" class="tab-inactive flex flex-col items-center gap-1 py-2.5 px-5 rounded-xl transition-all duration-200" aria-label="Following">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
<span class="text-[11px] font-semibold">Following</span>
</button>
<button onclick="setFilter('my')" id="tab-my" class="tab-inactive flex flex-col items-center gap-1 py-2.5 px-5 rounded-xl transition-all duration-200 relative" aria-label="My posts">
<div class="relative">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
<span class="absolute -top-1 -right-2 w-2 h-2 bg-amber-500 rounded-full"></span>
</div>
<span class="text-[11px] font-semibold">My Posts</span>
</button>
</div>
</div>

<div id="postsFeed" class="px-4 pb-24 mt-4 space-y-3"></div>

<div id="emptyState" class="hidden flex-col items-center justify-center py-20 text-center">
<div class="w-16 h-16 bg-amber-500/20 rounded-2xl flex items-center justify-center mb-5">
<svg class="w-8 h-8 text-amber-500/60" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/><path d="M7 10h2v7H7zm4-3h2v10h-2zm4 6h2v4h-2z"/></svg>
</div>
<h3 class="text-lg font-bold text-white">No posts yet</h3>
<p class="text-gray-500 text-sm mt-1.5">Be the first to share something!</p>
</div>

<button onclick="document.getElementById('postInput').focus();window.scrollTo({top:0,behavior:'smooth'});" class="fixed bottom-6 right-5 w-14 h-14 bg-amber-500 hover:bg-amber-400 rounded-2xl shadow-lg shadow-amber-500/30 flex items-center justify-center text-black transition hover:scale-105 active:scale-90 z-40" aria-label="New post">
<svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
</button>

<!-- Rest of your modals and scripts remain the same -->
<div id="shareModal" class="fixed inset-0 z-50 hidden items-end justify-center bg-black/60 backdrop-blur-sm" onclick="if(event.target===this)closeShareModal()">
<!-- ... share modal content unchanged ... -->
</div>

<div id="profileModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm p-4" onclick="if(event.target===this)closeProfileModal()">
<!-- ... profile modal unchanged ... -->
</div>

<div id="editProfileModal" class="fixed inset-0 z-[60] hidden items-center justify-center bg-black/70 backdrop-blur-sm p-4" onclick="if(event.target===this)closeEditProfile()">
<!-- ... edit profile unchanged ... -->
</div>

<div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 bg-[#1e293b] text-white px-5 py-3 rounded-2xl shadow-2xl border border-white/8 flex items-center gap-2.5 text-sm font-semibold opacity-0 pointer-events-none transition-all duration-300 z-50 -translate-y-2">
<svg id="toastIcon" class="w-5 h-5 text-green-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
<span id="toastMsg">Copied!</span>
</div>

<script>
const BADGES={
member:{icon:'<div class=\'w-3.5 h-3.5 rounded-full bg-green-500 border border-green-400\'></div>',name:'Member',desc:'Become a registered member of LASU GradeTracker',bg:'bg-green-500/15',border:'border-green-500/30',condition:u=>u.isMember},
influencer:{icon:'<div class=\'w-3.5 h-3.5 rounded-full bg-orange-500 border border-orange-400\'></div>',name:'Influencer',desc:'Create 30+ posts in the community',bg:'bg-orange-500/15',border:'border-orange-500/30',condition:u=>u.posts>=30},
popular:{icon:'⭐',name:'Popular',desc:'Get 500+ likes on your posts',bg:'bg-yellow-500/15',border:'border-yellow-500/30',condition:u=>u.likes>=500},
admin:{icon:'<div class=\'w-3.5 h-3.5 rounded-full bg-red-500 border border-red-400\'></div>',name:'Admin',desc:'Official LASU GradeTracker administrator',bg:'bg-red-500/15',border:'border-red-500/30',condition:u=>u.isAdmin}
};

function getUserBadges(user){
return Object.entries(BADGES).filter(([k,b])=>b.condition(user)).map(([k,b])=>({key:k,...b}));
}

function renderBadge(badge,small=false){
const size=small?'w-5 h-5':'w-6 h-6';
const isHtml=badge.icon.startsWith('<div');
return `<div class="badge-wrap inline-flex items-center justify-center ${size} ${badge.bg} \( {badge.border} border rounded-full cursor-help" title=" \){badge.name}: \( {badge.desc}"> \){isHtml?badge.icon:'<span class="text-[10px]">'+badge.icon+'</span>'}<div class="badge-tooltip"><div class="font-semibold text-white flex items-center gap-1.5">\( {isHtml?badge.icon:'<span>'+badge.icon+'</span>'}<span> \){badge.name}</span></div><div class="text-gray-400 text-[10px] mt-0.5">${badge.desc}</div></div></div>`;
}

const currentUser={
name:'LASU GradeTracker Official',
handle:'@lasu_official',
avatar:'https://api.dicebear.com/7.x/avataaars/svg?seed=official',
dept:'Administration',
level:'Staff',
bio:'Official LASU GradeTracker account. Announcements, updates & community management.',
posts:45,
likes:1200,
wins:0,
followers:2500,
following:false,
online:true,
isMember:true,
isAdmin:true
};

const demoUsers=[
{name:'Adebola Oluwaseun',handle:'@adebola_seun',avatar:'https://api.dicebear.com/7.x/avataaars/svg?seed=adebola',dept:'Chemistry',level:'200L',bio:'LASU Chemistry student | GradeTracker enthusiast | Always grinding | 4.0 or nothing!',posts:12,likes:48,wins:3,followers:156,following:false,online:true,isMember:true,isAdmin:false},
{name:'Chioma Nwosu',handle:'@chioma_n',avatar:'https://api.dicebear.com/7.x/avataaars/svg?seed=chioma',dept:'Biology',level:'300L',bio:'Bio major | Nature lover | LASU represent! | Future researcher',posts:8,likes:32,wins:1,followers:89,following:false,online:true,isMember:true,isAdmin:false},
{name:'Tunde Bakare',handle:'@tunde_b',avatar:'https://api.dicebear.com/7.x/avataaars/svg?seed=tunde',dept:'Physics',level:'100L',bio:'First year vibes | Physics is life | Still figuring things out',posts:5,likes:19,wins:0,followers:42,following:false,online:false,isMember:true,isAdmin:false}
];

let posts=JSON.parse(localStorage.getItem('lasu_posts')||'[]');
let currentFilter='all';
let sharePostId=null;
let viewedProfileId=null;
let currentProfileTab='posts';
let tempAvatar=null;

if(posts.length===0){
posts=[
{id:1,userId:1,content:'Just calculated my CGPA using the LASU GradeTracker! Went from 3.2 to 3.8 this semester. Who else is using it?',time:'2h ago',likes:24,comments:5,shares:3,liked:false,saved:false,tags:['#GradeTracker','#LASU'],image:null},
{id:2,userId:2,content:'Bio 301 practical was something else today. Thank God for this app helping me track my grades so I know where I stand!',time:'4h ago',likes:15,comments:2,shares:1,liked:false,saved:false,tags:['#BioLife','#LASU'],image:null},
{id:3,userId:0,content:'Important Announcement: The new GPA calculator update is live! Now supports 5-point and 4-point grading systems. Check it out!',time:'1h ago',likes:156,comments:23,shares:45,liked:false,saved:false,tags:['#Announcement','#Update'],image:null}
];
localStorage.setItem('lasu_posts',JSON.stringify(posts));
}

function getUser(id){return id===0?currentUser:demoUsers[id-1]||currentUser;}

function togglePostBtn(el){document.getElementById('postBtn').disabled=el.value.trim().length===0;}

function showToast(msg,type='success'){
const toast=document.getElementById('toast');
const icon=document.getElementById('toastIcon');
document.getElementById('toastMsg').textContent=msg;
if(type==='success'){icon.innerHTML='<path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>';icon.className='w-5 h-5 text-green-400 shrink-0';}
else if(type==='info'){icon.innerHTML='<path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>';icon.className='w-5 h-5 text-amber-400 shrink-0';}
toast.style.opacity='1';toast.style.transform='translateX(-50%) translateY(0)';toast.style.pointerEvents='auto';
setTimeout(()=>{toast.style.opacity='0';toast.style.transform='translateX(-50%) translateY(-10px)';toast.style.pointerEvents='none';},2500);
}

function createPost(){
const input=document.getElementById('postInput');
const content=input.value.trim();
if(!content)return;
const newPost={id:Date.now(),userId:0,content:content,time:'Just now',likes:0,comments:0,shares:0,liked:false,saved:false,tags:extractTags(content),image:null};
posts.unshift(newPost);currentUser.posts++;
localStorage.setItem('lasu_posts',JSON.stringify(posts));
input.value='';togglePostBtn(input);renderPosts();showToast('Post created successfully!');
}

function extractTags(text){const tags=text.match(/#[\w]+/g);return tags||[];}

function likePost(id){
const post=posts.find(p=>p.id===id);
if(post){post.liked=!post.liked;post.likes+=post.liked?1:-1;localStorage.setItem('lasu_posts',JSON.stringify(posts));renderPosts();}
}

function savePost(id){
const post=posts.find(p=>p.id===id);
if(post){
post.saved=!post.saved;
localStorage.setItem('lasu_posts',JSON.stringify(posts));
renderPosts();
if(post.saved){
const blob=new Blob([post.content],{type:'text/plain'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');a.href=url;a.download='LASU-GradeTracker-Post.txt';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
showToast('Saved to profile & downloaded to phone!');
}else{showToast('Removed from saved posts','info');}
}
}

function commentPost(id){showToast('Comments coming with Firebase!','info');}

function openShare(id){sharePostId=id;const modal=document.getElementById('shareModal');modal.classList.remove('hidden');modal.classList.add('flex');}
function closeShareModal(){const modal=document.getElementById('shareModal');modal.classList.add('hidden');modal.classList.remove('flex');sharePostId=null;}

function shareTo(platform){
const post=posts.find(p=>p.id===sharePostId);
const text=post?post.content.substring(0,100)+'...':'Check out LASU GradeTracker!';
const url='https://lasu-gradetracker.github.io/post/'+sharePostId;
let shareUrl='';
if(platform==='whatsapp')shareUrl='https://wa.me/?text='+encodeURIComponent(text+'\n\n'+url);
else if(platform==='twitter')shareUrl='https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(url);
else if(platform==='facebook')shareUrl='https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(url);
if(shareUrl)window.open(shareUrl,'_blank');closeShareModal();showToast('Opening '+platform+'...');
}

function copyLink(){navigator.clipboard.writeText('https://lasu-gradetracker.github.io/post/'+sharePostId);closeShareModal();showToast('Link copied to clipboard!');}

function switchProfileTab(tab){
currentProfileTab=tab;
['posts','diary','saved'].forEach(t=>{
const btn=document.getElementById('profileTab-'+t);
const content=document.getElementById('profileContent-'+t);
if(t===tab){btn.className='profile-tab-active flex-1 py-2 rounded-lg text-xs font-semibold transition-all';content.classList.remove('hidden');}
else{btn.className='profile-tab-inactive flex-1 py-2 rounded-lg text-xs font-medium transition-all';content.classList.add('hidden');}
});
if(tab==='posts')loadProfilePosts();
}

function loadProfilePosts(){
const container=document.getElementById('profileContent-posts');
const userPosts=posts.filter(p=>p.userId===viewedProfileId||(viewedProfileId===0&&p.userId===0));
if(userPosts.length===0){container.innerHTML='<div class="text-center py-8"><svg class="w-10 h-10 text-gray-600 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg><p class="text-gray-500 text-sm">No posts yet</p></div>';return;}
container.innerHTML=userPosts.map(post=>`<div class="bg-[#0f172a] rounded-xl p-3 border border-white/5"><p class="text-gray-200 text-[13px] leading-relaxed">\( {post.content}</p><div class="flex items-center gap-3 mt-2 text-[11px] text-gray-500"><span> \){post.time}</span><span>&#10084;&#65039; ${post.likes}</span><span>&#128172; ${post.comments}</span></div></div>`).join('');
}

function openProfile(userId){
viewedProfileId=userId;
const user=getUser(userId);
const isSelf=userId===0;
const badges=getUserBadges(user);
document.getElementById('modalAvatar').src=user.avatar;
document.getElementById('modalName').textContent=user.name;
document.getElementById('modalHandle').textContent=user.handle;
document.getElementById('modalBio').textContent=user.bio;
document.getElementById('modalDept').textContent=user.dept;
document.getElementById('modalLevel').textContent=user.level;
document.getElementById('modalPosts').textContent=user.posts;
document.getElementById('modalLikes').textContent=user.likes;
document.getElementById('modalWins').textContent=user.wins;
document.getElementById('modalFollowers').textContent=user.followers;
const badgeArea=document.getElementById('modalBadgeArea');
if(badges.length>0){badgeArea.innerHTML=badges.map(b=>renderBadge(b,true)).join('');}else{badgeArea.innerHTML='';}
document.getElementById('editAvatarBtn').style.display=isSelf?'flex':'none';
const followBtn=document.getElementById('modalFollowBtn');
if(isSelf){followBtn.textContent='Edit Profile';followBtn.onclick=openEditProfile;followBtn.className='flex-1 bg-[#0f172a] hover:bg-white/5 text-white font-bold py-2.5 rounded-xl text-sm transition border border-white/8';}
else{followBtn.textContent=user.following?'Following':'Follow';followBtn.onclick=toggleFollow;followBtn.className=user.following?'flex-1 bg-[#0f172a] hover:bg-white/5 text-white font-bold py-2.5 rounded-xl text-sm transition border border-white/8':'flex-1 bg-amber-500 hover:bg-amber-400 text-black font-bold py-2.5 rounded-xl text-sm transition';}
switchProfileTab('posts');
const modal=document.getElementById('profileModal');modal.classList.remove('hidden');modal.classList.add('flex');
}

function closeProfileModal(){const modal=document.getElementById('profileModal');modal.classList.add('hidden');modal.classList.remove('flex');viewedProfileId=null;}

function toggleFollow(){
if(viewedProfileId===null||viewedProfileId===0)return;
const user=demoUsers[viewedProfileId-1];
user.following=!user.following;user.followers+=user.following?1:-1;
openProfile(viewedProfileId);
showToast(user.following?'Now following '+user.name+'!':'Unfollowed '+user.name,'info');
}

function openEditProfile(){
closeProfileModal();
document.getElementById('editAvatarPreview').src=currentUser.avatar;
document.getElementById('editName').value=currentUser.name;
document.getElementById('editBio').value=currentUser.bio;
document.getElementById('editDept').value=currentUser.dept;
document.getElementById('editLevel').value=currentUser.level;
tempAvatar=null;
const modal=document.getElementById('editProfileModal');modal.classList.remove('hidden');modal.classList.add('flex');
}

function closeEditProfile(){const modal=document.getElementById('editProfileModal');modal.classList.add('hidden');modal.classList.remove('flex');tempAvatar=null;}

function handleAvatarChange(event){
const file=event.target.files[0];if(!file)return;
const reader=new FileReader();
reader.onload=(e)=>{tempAvatar=e.target.result;document.getElementById('editAvatarPreview').src=tempAvatar;};
reader.readAsDataURL(file);
}

function saveProfile(){
currentUser.name=document.getElementById('editName').value||currentUser.name;
currentUser.bio=document.getElementById('editBio').value||currentUser.bio;
currentUser.dept=document.getElementById('editDept').value||currentUser.dept;
currentUser.level=document.getElementById('editLevel').value||currentUser.level;
if(tempAvatar){currentUser.avatar=tempAvatar;}
document.querySelector('header img[alt="My Profile"]').src=currentUser.avatar;
document.querySelector('#postInput').parentElement.previousElementSibling.src=currentUser.avatar;
closeEditProfile();showToast('Profile updated successfully!');
setTimeout(()=>openProfile(0),300);
}

function setFilter(filter){
currentFilter=filter;
['all','trending','following','my'].forEach(f=>{
const btn=document.getElementById('tab-'+f);
if(f===filter){btn.className='tab-active flex flex-col items-center gap-1 py-2.5 px-5 rounded-xl transition-all duration-200';}
else{btn.className='tab-inactive flex flex-col items-center gap-1 py-2.5 px-5 rounded-xl transition-all duration-200';}
});
renderPosts();
}

function renderPosts(){
const feed=document.getElementById('postsFeed');
const empty=document.getElementById('emptyState');
let filtered=posts;
if(currentFilter==='my')filtered=posts.filter(p=>p.userId===0);
if(currentFilter==='trending')filtered=[...posts].sort((a,b)=>b.likes-a.likes);
if(currentFilter==='following')filtered=posts.filter(p=>p.userId!==0);
if(filtered.length===0){feed.innerHTML='';empty.classList.remove('hidden');empty.classList.add('flex');return;}
empty.classList.add('hidden');empty.classList.remove('flex');
feed.innerHTML=filtered.map(post=>{
const user=getUser(post.userId);
const isAdmin=user.isAdmin;
const userBadges=getUserBadges(user);
return `<div class="post-card bg-[#1e293b] rounded-2xl border border-white/6 p-4"><div class="flex items-start gap-3"><div class="relative shrink-0"><img src="\( {user.avatar}" onclick="openProfile( \){post.userId})" class="w-10 h-10 rounded-full cursor-pointer avatar-hover object-cover border \( {isAdmin?'border-red-500/50':'border-white/8'}" alt=" \){user.name}"></div><div class="flex-1 min-w-0"><div class="flex items-center gap-2 flex-wrap"><span onclick="openProfile(${post.userId})" class="font-semibold text-[13px] cursor-pointer hover:text-amber-400 transition truncate \( {isAdmin?'text-red-400':'text-white'}"> \){user.name}</span>\( {userBadges.length>0?`<div class="flex items-center gap-0.5"> \){userBadges.map(b=>renderBadge(b,true)).join('')}</div>`:''}<span class="text-gray-500 text-[11px] ml-auto">\( {post.time}</span></div><p class="text-gray-200 text-[14px] mt-2 leading-relaxed"> \){formatContent(post.content)}</p>\( {post.tags.length?`<div class="flex flex-wrap gap-2 mt-2.5"> \){post.tags.map(t=>`<span class="text-amber-400/70 text-[11px] font-medium hover:text-amber-400 cursor-pointer transition">\( {t}</span>`).join('')}</div>`:''}<div class="flex items-center gap-1 mt-3.5 pt-3 border-t border-white/5"><button onclick="likePost( \){post.id})" class="action-btn flex items-center gap-1.5 text-[12px] font-medium px-2.5 py-1.5 rounded-lg transition ${post.liked?'text-red-400 bg-red-500/8':'text-gray-400 hover:text-red-400 hover:bg-white/4'}" aria-label="Like"><svg class="w-[18px] h-[18px] \( {post.liked?'fill-current':''}" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg><span> \){post.likes}</span></button><button onclick="commentPost(\( {post.id})" class="action-btn flex items-center gap-1.5 text-[12px] font-medium px-2.5 py-1.5 rounded-lg text-gray-400 hover:text-blue-400 hover:bg-white/4 transition" aria-label="Comment"><svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg><span> \){post.comments}</span></button><button onclick="openShare(\( {post.id})" class="action-btn flex items-center gap-1.5 text-[12px] font-medium px-2.5 py-1.5 rounded-lg text-gray-400 hover:text-green-400 hover:bg-white/4 transition" aria-label="Share"><svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg><span> \){post.shares}</span></button><button onclick="savePost(${post.id})" class="action-btn flex items-center gap-1.5 text-[12px] font-medium px-2.5 py-1.5 rounded-lg transition ml-auto ${post.saved?'text-amber-400 bg-amber-500/8':'text-gray-400 hover:text-amber-400 hover:bg-white/4'}" aria-label="Save"><svg class="w-[18px] h-[18px] ${post.saved?'fill-current':''}" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg></button></div></div></div></div>`;
}).join('');
}

function formatContent(text){return text.replace(/(#[\w]+)/g,'<span class="text-amber-400/80 hover:text-amber-400 cursor-pointer transition">$1</span>');}

// New function for home button
function goToLounge() {
  window.location.href = 'lounge.html';
}

renderPosts();
</script>
</body>
</html>
