<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASU Lounge - General Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a; --bg-card: #1e293b; --bg-card-hover: #27354f;
            --accent: #f59e0b; --accent-light: #fbbf24; --text-primary: #f1f5f9;
            --text-secondary: #94a3b8; --text-muted: #64748b; --border: #334155;
            --badge-member: #22c55e; --badge-contributor: #f97316;
            --badge-champion: #eab308; --badge-admin: #ef4444;
            --success: #22c55e; --error: #ef4444; --info: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg-dark);
            color: var(--text-primary); min-height: 100vh; overflow-x: hidden;
            padding-bottom: 20px;
        }

        /* Header */
        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.3rem; }
        .logo img { width: 36px; height: 36px; border-radius: 8px; }
        .logo .lasu { color: var(--accent); }
        .logo .gradetracker { color: var(--text-primary); }
        .back-btn { background: none; border: none; color: var(--accent);
            font-size: 1.1rem; cursor: pointer; padding: 8px; border-radius: 8px; transition: all 0.2s; }
        .back-btn:hover { background: rgba(245, 158, 11, 0.1); }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .header-avatar { width: 38px; height: 38px; border-radius: 50%;
            border: 2px solid var(--accent); object-fit: cover; cursor: pointer; transition: transform 0.2s; }
        .header-avatar:hover { transform: scale(1.1); }
        .notification-btn { background: none; border: none; color: var(--text-secondary);
            font-size: 1.2rem; cursor: pointer; padding: 8px; border-radius: 8px;
            position: relative; transition: all 0.2s; }
        .notification-btn:hover { color: var(--accent); background: rgba(245, 158, 11, 0.1); }
        .notif-badge { position: absolute; top: 4px; right: 4px;
            width: 8px; height: 8px; background: var(--error); border-radius: 50%; border: 2px solid var(--bg-dark); }

        /* Main Container */
        .main-container { max-width: 680px; margin: 0 auto; padding: 80px 16px 20px; }

        /* Page Title */
        .page-title { text-align: center; margin-bottom: 24px; }
        .page-title h1 { font-size: 1.8rem; font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: flex; align-items: center; justify-content: center; gap: 10px; }
        .page-title p { color: var(--text-secondary); font-size: 0.9rem; margin-top: 4px; }

        /* Create Post */
        .create-post-card {
            background: var(--bg-card); border-radius: 16px;
            border: 1px solid var(--border); padding: 16px; margin-bottom: 20px;
        }
        .create-post-top { display: flex; gap: 12px; align-items: flex-start; }
        .create-post-avatar { width: 44px; height: 44px; border-radius: 50%;
            border: 2px solid var(--accent); object-fit: cover; flex-shrink: 0; }
        .create-post-input-wrap { flex: 1; }
        .create-post-input { width: 100%; background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px;
            color: var(--text-primary); font-family: inherit; font-size: 0.95rem;
            resize: none; outline: none; transition: all 0.2s; min-height: 80px; }
        .create-post-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1); }
        .create-post-input::placeholder { color: var(--text-muted); }
        .create-post-actions { display: flex; justify-content: space-between; align-items: center;
            margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
        .post-tools { display: flex; gap: 8px; }
        .tool-btn { background: none; border: none; color: var(--text-secondary);
            font-size: 0.85rem; cursor: pointer; padding: 8px 12px; border-radius: 8px;
            transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .tool-btn:hover { color: var(--accent); background: rgba(245, 158, 11, 0.1); }
        .tool-btn i { font-size: 1rem; }
        .post-btn { background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border: none; color: var(--bg-dark); font-weight: 700; padding: 10px 24px;
            border-radius: 10px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s;
            display: flex; align-items: center; gap: 6px; }
        .post-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }
        .post-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* FILTER TABS - Bottom nav style */
        .filter-tabs {
            display: flex; justify-content: space-around; align-items: center;
            background: var(--bg-card); border-radius: 16px; padding: 8px 4px;
            border: 1px solid var(--border); margin-bottom: 20px;
        }
        .filter-tab {
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            color: var(--text-muted); text-decoration: none; font-size: 0.65rem;
            padding: 6px 12px; border-radius: 10px; transition: all 0.2s;
            cursor: pointer; background: none; border: none; flex: 1;
        }
        .filter-tab:hover { color: var(--accent); }
        .filter-tab.active { color: var(--accent); }
        .filter-tab i { font-size: 1.2rem; }

        /* Post Card */
        .post-card { background: var(--bg-card); border-radius: 16px;
            border: 1px solid var(--border); margin-bottom: 16px; overflow: hidden; transition: all 0.2s; }
        .post-card:hover { border-color: rgba(245, 158, 11, 0.3); }
        .post-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 16px 16px 0; }
        .post-author { display: flex; gap: 12px; align-items: flex-start; }
        .author-avatar-link { text-decoration: none; }
        .author-avatar { width: 44px; height: 44px; border-radius: 50%;
            border: 2px solid var(--accent); object-fit: cover; cursor: pointer; transition: transform 0.2s; }
        .author-avatar:hover { transform: scale(1.08); }
        .author-info { display: flex; flex-direction: column; gap: 2px; }
        .author-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .author-name { font-weight: 700; font-size: 0.95rem; color: var(--text-primary);
            text-decoration: none; cursor: pointer; transition: color 0.2s; }
        .author-name:hover { color: var(--accent); }
        .badges-row { display: flex; gap: 3px; align-items: center; }
        .badge { width: 14px; height: 14px; border-radius: 50%; display: inline-block;
            border: 1.5px solid rgba(255,255,255,0.3); box-shadow: 0 0 4px rgba(0,0,0,0.3); }
        .badge.member { background: var(--badge-member); }
        .badge.contributor { background: var(--badge-contributor); }
        .badge.champion { background: var(--badge-champion); }
        .badge.admin { background: var(--badge-admin); }
        .author-meta { display: flex; align-items: center; gap: 8px;
            font-size: 0.8rem; color: var(--text-muted); }
        .follow-btn-small { background: none; border: 1px solid var(--accent); color: var(--accent);
            padding: 3px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s; }
        .follow-btn-small:hover { background: var(--accent); color: var(--bg-dark); }
        .follow-btn-small.following { background: var(--accent); color: var(--bg-dark); border-color: var(--accent); }
        .post-menu-btn { background: none; border: none; color: var(--text-muted);
            font-size: 1.2rem; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all 0.2s; }
        .post-menu-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
        .post-content { padding: 12px 16px 8px; }
        .post-text { font-size: 0.95rem; line-height: 1.6; color: var(--text-primary);
            white-space: pre-wrap; word-break: break-word; }
        .post-text a { color: var(--accent); text-decoration: none; }
        .post-text a:hover { text-decoration: underline; }
        .post-image { width: 100%; border-radius: 12px; margin-top: 12px; max-height: 400px; object-fit: cover; }
        .post-stats { display: flex; gap: 16px; padding: 8px 16px;
            font-size: 0.8rem; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        .post-actions { display: flex; justify-content: space-around; padding: 8px 0; }
        .action-btn { background: none; border: none; color: var(--text-secondary);
            font-size: 0.85rem; cursor: pointer; padding: 8px 16px; border-radius: 8px;
            transition: all 0.2s; display: flex; align-items: center; gap: 6px;
            font-weight: 500; position: relative; }
        .action-btn:hover { background: rgba(245, 158, 11, 0.1); color: var(--accent); }
        .action-btn.active { color: var(--accent); }
        .action-btn.active i { color: var(--accent); }
        .reaction-picker { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
            padding: 8px; display: flex; gap: 6px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 100; opacity: 0; visibility: hidden; transition: all 0.2s; margin-bottom: 8px; }
        .reaction-picker.show { opacity: 1; visibility: visible; }
        .reaction-opt { font-size: 1.4rem; cursor: pointer; padding: 4px 6px;
            border-radius: 8px; transition: all 0.2s; background: none; border: none; }
        .reaction-opt:hover { background: rgba(245, 158, 11, 0.15); transform: scale(1.2); }
        .reaction-opt.selected { background: rgba(245, 158, 11, 0.2); }
        .comments-section { padding: 0 16px 16px; display: none; }
        .comments-section.show { display: block; }
        .comment-input-wrap { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px; }
        .comment-avatar { width: 32px; height: 32px; border-radius: 50%;
            border: 1.5px solid var(--accent); object-fit: cover; }
        .comment-input-area { flex: 1; display: flex; gap: 8px; align-items: flex-start; }
        .comment-input { flex: 1; background: rgba(30, 41, 59, 0.8); border: 1px solid var(--border);
            border-radius: 10px; padding: 10px 14px; color: var(--text-primary);
            font-family: inherit; font-size: 0.9rem; resize: none; outline: none;
            min-height: 40px; max-height: 120px; }
        .comment-input:focus { border-color: var(--accent); }
        .comment-submit { background: var(--accent); border: none; color: var(--bg-dark);
            width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0; }
        .comment-submit:hover { transform: scale(1.1); }
        .comment-item { display: flex; gap: 10px; margin-bottom: 12px;
            padding: 10px; background: rgba(255,255,255,0.02); border-radius: 10px; }
        .comment-body { flex: 1; }
        .comment-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .comment-author { font-weight: 600; font-size: 0.85rem; color: var(--text-primary);
            text-decoration: none; cursor: pointer; }
        .comment-author:hover { color: var(--accent); }
        .comment-time { font-size: 0.75rem; color: var(--text-muted); }
        .comment-text { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5; }
        .comment-actions { display: flex; gap: 12px; margin-top: 6px; }
        .comment-action { background: none; border: none; color: var(--text-muted);
            font-size: 0.75rem; cursor: pointer; font-weight: 500; transition: color 0.2s; }
        .comment-action:hover { color: var(--accent); }
        .reply-input-wrap { margin-top: 8px; margin-left: 42px; display: none; }
        .reply-input-wrap.show { display: flex; gap: 8px; }

        /* Dropdown Menu */
        .dropdown-menu { position: absolute; right: 0; top: 100%; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: 12px; min-width: 200px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5); z-index: 200; overflow: hidden; display: none; }
        .dropdown-menu.show { display: block; }
        .dropdown-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
            color: var(--text-primary); font-size: 0.9rem; cursor: pointer;
            transition: all 0.2s; border: none; background: none; width: 100%; text-align: left; }
        .dropdown-item:hover { background: rgba(245, 158, 11, 0.1); }
        .dropdown-item.danger { color: var(--error); }
        .dropdown-item.danger:hover { background: rgba(239, 68, 68, 0.1); }
        .dropdown-item i { width: 20px; text-align: center; }
        .dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }

        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 2000; display: none; align-items: center; justify-content: center;
            padding: 20px; backdrop-filter: blur(5px); }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border);
            max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto;
            animation: modalIn 0.3s ease; }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center;
            padding: 20px; border-bottom: 1px solid var(--border); }
        .modal-header h2 { font-size: 1.2rem; font-weight: 700; }
        .modal-close { background: none; border: none; color: var(--text-muted);
            font-size: 1.3rem; cursor: pointer; padding: 4px; border-radius: 6px; transition: all 0.2s; }
        .modal-close:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
        .modal-body { padding: 20px; }

        /* Profile Modal */
        .profile-header { text-align: center; padding: 20px 0; }
        .profile-avatar-large { width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid var(--accent); object-fit: cover; margin: 0 auto 12px; }
        .profile-name { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px;
            display: flex; align-items: center; justify-content: center; gap: 8px; }
        .profile-badges { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; }
        .profile-badges .badge { width: 18px; height: 18px; }
        .profile-stats-row { display: flex; justify-content: center; gap: 24px; margin: 16px 0; }
        .profile-stat { text-align: center; }
        .profile-stat-value { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
        .profile-stat-label { font-size: 0.8rem; color: var(--text-muted); }
        .profile-bio { color: var(--text-secondary); font-size: 0.9rem; max-width: 300px; margin: 0 auto; }
        .profile-actions { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
        .profile-btn { padding: 10px 24px; border-radius: 10px; font-weight: 600;
            font-size: 0.9rem; cursor: pointer; transition: all 0.2s; border: none; }
        .profile-btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent-light)); color: var(--bg-dark); }
        .profile-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }
        .profile-btn.secondary { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); }
        .profile-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }
        .profile-posts { margin-top: 20px; }
        .profile-posts h3 { font-size: 1rem; margin-bottom: 12px; color: var(--text-secondary); }

        /* Edit Profile Modal */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600;
            color: var(--text-secondary); margin-bottom: 6px; }
        .form-group input, .form-group textarea { width: 100%; background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px;
            color: var(--text-primary); font-family: inherit; font-size: 0.95rem; outline: none; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .avatar-picker { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
        .avatar-option { width: 60px; height: 60px; border-radius: 50%; border: 2px solid transparent;
            cursor: pointer; object-fit: cover; transition: all 0.2s; }
        .avatar-option:hover { transform: scale(1.1); }
        .avatar-option.selected { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.3); }
        .save-btn { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border: none; color: var(--bg-dark); font-weight: 700; padding: 14px;
            border-radius: 12px; cursor: pointer; font-size: 1rem; transition: all 0.2s; }
        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }

        /* Toast */
        .toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
        .toast { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
            padding: 12px 20px; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); animation: toastIn 0.3s ease; font-size: 0.9rem; }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--error); }
        .toast.info { border-color: var(--info); }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-posts { text-align: center; padding: 40px; color: var(--text-muted); }
        .loading-posts i { font-size: 2rem; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 3rem; margin-bottom: 16px; color: var(--accent); opacity: 0.5; }
        .empty-state h3 { font-size: 1.1rem; margin-bottom: 8px; color: var(--text-primary); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        @media (max-width: 480px) {
            .main-container { padding: 70px 12px 20px; }
            .post-actions { padding: 6px 0; }
            .action-btn { padding: 6px 10px; font-size: 0.8rem; }
            .header { padding: 10px 12px; }
            .logo { font-size: 1.1rem; }
            .logo img { width: 30px; height: 30px; }
        }

        .reactions-display { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 16px 8px; }
        .reaction-chip { display: flex; align-items: center; gap: 4px;
            background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 20px; padding: 4px 10px; font-size: 0.8rem;
            color: var(--accent); cursor: pointer; transition: all 0.2s; }
        .reaction-chip:hover { background: rgba(245, 158, 11, 0.2); }
        .reaction-chip.active { background: rgba(245, 158, 11, 0.25); border-color: var(--accent); }
        .report-reasons { display: flex; flex-direction: column; gap: 8px; }
        .report-reason { padding: 12px 16px; background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border); border-radius: 10px; cursor: pointer;
            transition: all 0.2s; color: var(--text-primary); font-size: 0.9rem; }
        .report-reason:hover { border-color: var(--accent); background: rgba(245, 158, 11, 0.05); }
        .report-reason.selected { border-color: var(--accent); background: rgba(245, 158, 11, 0.1); }
        .post-card.muted { opacity: 0.6; }
        .action-btn.bookmarked i { color: var(--accent); }
        .share-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 16px; }
        .share-option { display: flex; flex-direction: column; align-items: center; gap: 6px;
            padding: 16px; border-radius: 12px; cursor: pointer; transition: all 0.2s;
            background: rgba(30, 41, 59, 0.8); border: 1px solid var(--border);
            color: var(--text-primary); font-size: 0.8rem; border: none; }
        .share-option:hover { border-color: var(--accent); background: rgba(245, 158, 11, 0.1); }
        .share-option i { font-size: 1.5rem; }
        .share-option.whatsapp i { color: #25d366; }
        .share-option.facebook i { color: #1877f2; }
        .share-option.twitter i { color: #1da1f2; }
        .share-option.copy i { color: var(--accent); }
        .share-link-box { display: flex; gap: 8px; padding: 0 16px 16px; }
        .share-link-box input { flex: 1; background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px;
            color: var(--text-primary); font-size: 0.85rem; }
        .share-link-box button { background: var(--accent); border: none; color: var(--bg-dark);
            padding: 10px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="logo">
                <img src="your-logo.png" alt="LASU">
                <span class="lasu">LASU</span><span class="gradetracker">GradeTracker</span>
            </div>
        </div>
        <div class="header-right">
            <button class="notification-btn" onclick="showNotifications()">
                <i class="fas fa-bell"></i>
                <span class="notif-badge" id="notifBadge" style="display:none"></span>
            </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

        import {

        const firebaseConfig = {

            auth = getAuth(app);

        } catch(e) {

        let currentUser = null;
        let currentUserData = null;
        let activePostId = null;

        const demoPosts = [
            {

                image: null, createdAt: Date.now() - 7200000,

                shares: 8, bookmarks: [], mutedBy: [], reportedBy: []
            },
            {

                image: null, createdAt: Date.now() - 86400000,
                reactions: { '&#10084;': ['user1', 'user2', 'user4'], '&#128079;': ['user1', 'user2'], '&#128293;': ['user4'] },
                comments: [
                    { id: 'c3', userId: 'user2', text: 'Thanks Amina! Needed this', createdAt: Date.now() - 85000000, replies: [] },
                    { id: 'c4', userId: 'user4', text: 'Best of luck to everyone!', createdAt: Date.now() - 84000000, replies: [] }
                ],
                shares: 15, bookmarks: ['user2', 'user4'], mutedBy: [], reportedBy: []
            },
            {
                id: 'post4', userId: 'user4', text: "Welcome to the LASU Lounge! This is your space to connect, share, and grow together. Remember to be kind and respectful to everyone. Let's build an amazing community!",
                image: null, createdAt: Date.now() - 172800000,
                reactions: { '&#10084;': ['user1', 'user2', 'user3'], '&#128079;': ['user1', 'user2', 'user3'], '&#128293;': ['user1', 'user2'] },
                comments: [],
                shares: 45, bookmarks: ['user1', 'user2', 'user3'], mutedBy: [], reportedBy: []
            }
        ];

        async function init() {
            if (firebaseReady) {
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        currentUser = user;
                        await loadUserData(user.uid);
                    } else {
                        const cred = await signInAnonymously(auth);
                        currentUser = cred.user;
                        await createDemoUser(currentUser.uid);
                        await loadUserData(currentUser.uid);
                    }
                });
            } else {
                currentUser = { uid: 'demoUser' };
                currentUserData = {
                    uid: 'demoUser', displayName: 'You', 
                    avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Emma&style=circle',
                    bio: '', department: '', level: '',
                    badges: ['member'], postsCount: 0, followers: 0, following: 0,
                    followingUsers: [], mutedUsers: [], savedPosts: [],
                    createdAt: Date.now()
                };
                updateHeader();
                loadPosts();
                initAvatarPicker();
            }
        }

        async function createDemoUser(uid) {
            if (!db) return;
            const userRef = doc(db, 'users', uid);
            const snap = await getDoc(userRef);
            if (!snap.exists()) {
                await updateDoc(userRef, {
                    uid, displayName: 'New Member',
                    avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${AVATAR_SEEDS[0]}&style=circle`,
                    bio: '', department: '', level: '',
                    badges: ['member'], postsCount: 0, followers: 0, following: 0,
                    followingUsers: [], mutedUsers: [], savedPosts: [],
                    createdAt: serverTimestamp()
                });
            }
        }

        async function loadUserData(uid) {
            if (!db) {
                currentUserData = demoUsers[uid] || currentUserData;
                updateHeader();
                loadPosts();
                initAvatarPicker();
                return;
            }
            try {
                const userRef = doc(db, 'users', uid);
                const snap = await getDoc(userRef);
                if (snap.exists()) {
                    currentUserData = { uid, ...snap.data() };
                } else {
                    currentUserData = {
                        uid, displayName: 'New Member',
                        avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${AVATAR_SEEDS[0]}&style=circle`,
                        bio: '', department: '', level: '',
                        badges: ['member'], postsCount: 0, followers: 0, following: 0,
                        followingUsers: [], mutedUsers: [], savedPosts: [],
                        createdAt: Date.now()
                    };
                }
            } catch (e) {
                currentUserData = demoUsers[uid] || currentUserData;
            }
            updateHeader();
            loadPosts();
            initAvatarPicker();
        }

        function updateHeader() {
            if (currentUserData) {
                document.getElementById('headerAvatar').src = currentUserData.avatar;
                document.getElementById('createPostAvatar').src = currentUserData.avatar;
                document.getElementById('editProfileAvatar').src = currentUserData.avatar;
            }
        }

        function loadPosts() {
            if (firebaseReady && db) {
                const postsRef = collection(db, 'posts');
                let q = query(postsRef, orderBy('createdAt', 'desc'), limit(50));
                if (currentFilter === 'following' && currentUserData?.followingUsers?.length > 0) {
                    q = query(postsRef, where('userId', 'in', currentUserData.followingUsers.slice(0, 10)), orderBy('createdAt', 'desc'));
                } else if (currentFilter === 'mine') {
                    q = query(postsRef, where('userId', '==', currentUser.uid), orderBy('createdAt', 'desc'));
                }
                if (postsUnsubscribe) postsUnsubscribe();
                postsUnsubscribe = onSnapshot(q, (snapshot) => {
                    const posts = [];
                    snapshot.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));
                    renderPosts(posts);
                }, (err) => {
                    renderDemoPosts();
                });
            } else {
                renderDemoPosts();
            }
        }

        function renderDemoPosts() {
            let posts = [...demoPosts];
            if (currentFilter === 'trending') {
                posts.sort((a, b) => {
                    const scoreA = Object.values(a.reactions).flat().length + a.comments.length + a.shares;
                    const scoreB = Object.values(b.reactions).flat().length + b.comments.length + b.shares;
                    return scoreB - scoreA;
                });
            } else if (currentFilter === 'following') {
                posts = posts.filter(p => currentUserData?.followingUsers?.includes(p.userId));
            } else if (currentFilter === 'mine') {
                posts = posts.filter(p => p.userId === currentUser?.uid);
            }
            renderPosts(posts);
        }

        function renderPosts(posts) {
            const feed = document.getElementById('postsFeed');
            if (posts.length === 0) {
                feed.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><h3>No posts yet</h3><p>Be the first to share something!</p></div>';
                return;
            }
            feed.innerHTML = posts.map(post => renderPostCard(post)).join('');
        }

        function renderPostCard(post) {
            const user = demoUsers[post.userId] || { displayName: 'Unknown', avatar: '', badges: [] };
            const isOwner = post.userId === currentUser?.uid;
            const isMuted = currentUserData?.mutedUsers?.includes(post.userId);
            const isBookmarked = currentUserData?.savedPosts?.includes(post.id);
            const timeAgo = getTimeAgo(post.createdAt);
            const reactionCounts = {};
            Object.entries(post.reactions || {}).forEach(([emoji, users]) => { reactionCounts[emoji] = users.length; });
            const totalReactions = Object.values(reactionCounts).reduce((a, b) => a + b, 0);
            const commentsCount = (post.comments || []).length;
            const myReactions = [];
            Object.entries(post.reactions || {}).forEach(([emoji, users]) => { if (users.includes(currentUser?.uid)) myReactions.push(emoji); });

            return `<div class="post-card ${isMuted ? 'muted' : ''}" id="post-${post.id}" data-post-id="${post.id}">
                <div class="post-header">
                    <div class="post-author">
                        <a href="#" class="author-avatar-link" onclick="viewProfile('${post.userId}'); return false;">
                            <img src="${user.avatar}" class="author-avatar" alt="${user.displayName}">
                        </a>
                        <div class="author-info">
                            <div class="author-name-row">
                                <a href="#" class="author-name" onclick="viewProfile('${post.userId}'); return false;">${user.displayName}</a>
                                <div class="badges-row">${user.badges.map(b => `<span class="badge ${b}" title="${getBadgeTitle(b)}"></span>`).join('')}</div>
                                ${post.userId !== currentUser?.uid ? `<button class="follow-btn-small ${currentUserData?.followingUsers?.includes(post.userId) ? 'following' : ''}" onclick="toggleFollow('${post.userId}', this)">${currentUserData?.followingUsers?.includes(post.userId) ? 'Following' : 'Follow'}</button>` : ''}
                            </div>
                            <div class="author-meta"><span>${timeAgo}</span>${user.department ? `<span>·</span><span>${user.department}</span>` : ''}</div>
                        </div>
                    </div>
                    <div style="position:relative;">
                        <button class="post-menu-btn" onclick="showPostMenu(event, '${post.id}', '${post.userId}', '${user.displayName}')"><i class="fas fa-ellipsis-h"></i></button>
                    </div>
                </div>
                <div class="post-content">
                    <div class="post-text">${linkifyText(post.text)}</div>
                    ${post.image ? `<img src="${post.image}" class="post-image" alt="Post image">` : ''}
                </div>
                ${totalReactions > 0 ? `<div class="reactions-display">${Object.entries(reactionCounts).map(([emoji, count]) => `<span class="reaction-chip ${myReactions.includes(emoji) ? 'active' : ''}" onclick="toggleReaction('${post.id}', '${emoji}')">${emoji} ${count}</span>`).join('')}</div>` : ''}
                <div class="post-stats"><span>${totalReactions} reactions</span><span>${commentsCount} comments</span><span>${post.shares || 0} shares</span></div>
                <div class="post-actions">
                    <button class="action-btn ${myReactions.length > 0 ? 'active' : ''}" onmouseenter="showReactions(event, '${post.id}')" onmouseleave="hideReactions(event)" onclick="toggleReaction('${post.id}', '&#128077;')">
                        <div class="reaction-picker" id="reactions-${post.id}">
                            <button class="reaction-opt ${myReactions.includes('&#128077;') ? 'selected' : ''}" onclick="event.stopPropagation(); toggleReaction('${post.id}', '&#128077;')">&#128077;</button>
                            <button class="reaction-opt ${myReactions.includes('&#10084;') ? 'selected' : ''}" onclick="event.stopPropagation(); toggleReaction('${post.id}', '&#10084;')">&#10084;</button>
                            <button class="reaction-opt ${myReactions.includes('&#128514;') ? 'selected' : ''}" onclick="event.stopPropagation(); toggleReaction('${post.id}', '&#128514;')">&#128514;</button>
                            <button class="reaction-opt ${myReactions.includes('&#128293;') ? 'selected' : ''}" onclick="event.stopPropagation(); toggleReaction('${post.id}', '&#128293;')">&#128293;</button>
                            <button class="reaction-opt ${myReactions.includes('&#128079;') ? 'selected' : ''}" onclick="event.stopPropagation(); toggleReaction('${post.id}', '&#128079;')">&#128079;</button>
                            <button class="reaction-opt ${myReactions.includes('&#128557;') ? 'selected' : ''}" onclick="event.stopPropagation(); toggleReaction('${post.id}', '&#128557;')">&#128557;</button>
                        </div>
                        <i class="fas fa-thumbs-up"></i> Like
                    </button>
                    <button class="action-btn" onclick="toggleComments('${post.id}')"><i class="fas fa-comment"></i> Comment</button>
                    <button class="action-btn ${isBookmarked ? 'bookmarked' : ''}" onclick="bookmarkPost('${post.id}')"><i class="fas fa-bookmark"></i> Save</button>
                    <button class="action-btn" onclick="openShareModal('${post.id}')"><i class="fas fa-share"></i> Share</button>
                </div>
                <div class="comments-section ${post.comments?.length > 0 ? 'show' : ''}" id="comments-${post.id}">
                    <div class="comment-input-wrap">
                        <img src="${currentUserData?.avatar || ''}" class="comment-avatar" alt="You">
                        <div class="comment-input-area">
                            <textarea class="comment-input" id="comment-input-${post.id}" placeholder="Write a comment..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addComment('${post.id}')}"></textarea>
                            <button class="comment-submit" onclick="addComment('${post.id}')"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                    <div id="comments-list-${post.id}">${(post.comments || []).map(c => renderComment(c, post.id)).join('')}</div>
                </div>
            </div>`;
        }

        function renderComment(comment, postId) {
            const user = demoUsers[comment.userId] || { displayName: 'Unknown', avatar: '' };
            const timeAgo = getTimeAgo(comment.createdAt);
            const isOwner = comment.userId === currentUser?.uid;
            return `<div class="comment-item" id="comment-${comment.id}">
                <img src="${user.avatar}" class="comment-avatar" alt="${user.displayName}">
                <div class="comment-body">
                    <div class="comment-header">
                        <a href="#" class="comment-author" onclick="viewProfile('${comment.userId}'); return false;">${user.displayName}</a>
                        <span class="comment-time">${timeAgo}</span>
                    </div>
                    <div class="comment-text">${comment.text}</div>
                    <div class="comment-actions">
                        <button class="comment-action" onclick="replyToComment('${postId}', '${comment.id}')">Reply</button>
                        ${isOwner ? `<button class="comment-action" onclick="deleteComment('${postId}', '${comment.id}')">Delete</button>` : ''}
                    </div>
                    <div class="reply-input-wrap" id="reply-wrap-${comment.id}">
                        <textarea class="comment-input" id="reply-input-${comment.id}" placeholder="Write a reply..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addReply('${postId}', '${comment.id}')}"></textarea>
                        <button class="comment-submit" onclick="addReply('${postId}', '${comment.id}')"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>`;
        }

        function getBadgeTitle(badge) {
            const titles = { member: 'Community Member', contributor: 'Active Contributor', champion: 'Challenge Champion', admin: 'Admin' };
            return titles[badge] || badge;
        }

        function getTimeAgo(timestamp) {
            const seconds = Math.floor((Date.now() - timestamp) / 1000);
            if (seconds < 60) return 'Just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            if (days < 7) return `${days}d ago`;
            const weeks = Math.floor(days / 7);
            if (weeks < 4) return `${weeks}w ago`;
            const months = Math.floor(days / 30);
            return `${months}mo ago`;
        }

        function linkifyText(text) {
            return text.replace(/#(\w+)/g, '<a href="#">#$1</a>').replace(/@(\w+)/g, '<a href="#" onclick="viewProfileByName(\'$1\'); return false;">@$1</a>');
        }

        window.goBack = () => { window.location.href = 'index.html'; };
        window.showNotifications = () => { showToast('Notifications coming soon!', 'info'); };
        window.addPhoto = () => { showToast('Photo upload coming soon!', 'info'); };
        window.addEmoji = () => { showToast('Emoji picker coming soon!', 'info'); };
        window.addTag = () => { showToast('Tag feature coming soon!', 'info'); };

        window.createPost = async () => {
            const input = document.getElementById('postInput');
            const text = input.value.trim();
            if (!text) { showToast('Write something first!', 'error'); return; }
            if (firebaseReady && db) {
                await addDoc(collection(db, 'posts'), {
                    userId: currentUser.uid, text, image: null,
                    createdAt: serverTimestamp(), reactions: {}, comments: [],
                    shares: 0, bookmarks: [], mutedBy: [], reportedBy: []
                });
                await updateDoc(doc(db, 'users', currentUser.uid), { postsCount: increment(1) });
            } else {
                const newPost = {
                    id: 'post' + Date.now(), userId: currentUser.uid, text, image: null,
                    createdAt: Date.now(), reactions: {}, comments: [],
                    shares: 0, bookmarks: [], mutedBy: [], reportedBy: []
                };
                demoPosts.unshift(newPost);
                currentUserData.postsCount++;
                renderDemoPosts();
            }
            input.value = '';
            showToast('Post created!', 'success');
        };

        window.filterPosts = (filter) => {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            event.target.closest('.filter-tab').classList.add('active');
            loadPosts();
        };

        window.showReactions = (e, postId) => {
            const picker = document.getElementById('reactions-' + postId);
            if (picker) picker.classList.add('show');
        };
        window.hideReactions = (e) => {
            const picker = e.currentTarget.querySelector('.reaction-picker');
            if (picker) {
                setTimeout(() => { if (!picker.matches(':hover')) picker.classList.remove('show'); }, 200);
            }
        };

        window.toggleReaction = async (postId, emoji) => {
            const post = demoPosts.find(p => p.id === postId);
            if (!post) return;
            const myUid = currentUser?.uid;
            if (!post.reactions[emoji]) post.reactions[emoji] = [];
            const idx = post.reactions[emoji].indexOf(myUid);
            if (idx > -1) {
                post.reactions[emoji].splice(idx, 1);
                if (post.reactions[emoji].length === 0) delete post.reactions[emoji];
            } else {
                let myTotal = 0;
                Object.values(post.reactions).forEach(users => { if (users.includes(myUid)) myTotal++; });
                if (myTotal >= 2 && idx === -1) {
                    showToast('You can only add 2 reactions per post', 'error'); return;
                }
                post.reactions[emoji].push(myUid);
            }
            if (firebaseReady && db) {
                await updateDoc(doc(db, 'posts', postId), { reactions: post.reactions });
            } else {
                renderDemoPosts();
            }
        };

        window.toggleComments = (postId) => {
            const section = document.getElementById('comments-' + postId);
            if (section) section.classList.toggle('show');
        };

        window.addComment = async (postId) => {
            const input = document.getElementById('comment-input-' + postId);
            const text = input.value.trim();
            if (!text) return;
            const comment = { id: 'c' + Date.now(), userId: currentUser.uid, text, createdAt: Date.now(), replies: [] };
            const post = demoPosts.find(p => p.id === postId);
            if (post) {
                post.comments.push(comment);
                if (firebaseReady && db) {
                    await updateDoc(doc(db, 'posts', postId), { comments: post.comments });
                } else {
                    renderDemoPosts();
                }
            }
            input.value = '';
        };

        window.replyToComment = (postId, commentId) => {
            const wrap = document.getElementById('reply-wrap-' + commentId);
            if (wrap) wrap.classList.toggle('show');
        };

        window.addReply = async (postId, commentId) => {
            const input = document.getElementById('reply-input-' + commentId);
            const text = input.value.trim();
            if (!text) return;
            const reply = { id: 'r' + Date.now(), userId: currentUser.uid, text, createdAt: Date.now() };
            const post = demoPosts.find(p => p.id === postId);
            if (post) {
                const comment = post.comments.find(c => c.id === commentId);
                if (comment) {
                    if (!comment.replies) comment.replies = [];
                    comment.replies.push(reply);
                    if (firebaseReady && db) {
                        await updateDoc(doc(db, 'posts', postId), { comments: post.comments });
                    } else {
                        renderDemoPosts();
                    }
                }
            }
            input.value = '';
            document.getElementById('reply-wrap-' + commentId).classList.remove('show');
        };

        window.deleteComment = async (postId, commentId) => {
            const post = demoPosts.find(p => p.id === postId);
            if (post) {
                post.comments = post.comments.filter(c => c.id !== commentId);
                if (firebaseReady && db) {
                    await updateDoc(doc(db, 'posts', postId), { comments: post.comments });
                } else {
                    renderDemoPosts();
                }
                showToast('Comment deleted', 'success');
            }
        };

        window.showPostMenu = (e, postId, userId, username) => {
            e.stopPropagation();
            activePostId = postId;
            const dropdown = document.getElementById('postMenuDropdown');
            const rect = e.currentTarget.getBoundingClientRect();
            dropdown.style.position = 'fixed';
            dropdown.style.top = (rect.bottom + 5) + 'px';
            dropdown.style.right = '16px';
            document.getElementById('menuUsername').textContent = username;
            const isOwner = userId === currentUser?.uid;
            document.getElementById('editPostBtn').style.display = isOwner ? 'flex' : 'none';
            document.getElementById('deletePostBtn').style.display = isOwner ? 'flex' : 'none';
            document.getElementById('ownerActionsDivider').style.display = isOwner ? 'block' : 'none';
            dropdown.classList.add('show');
            const closeMenu = (ev) => { if (!dropdown.contains(ev.target)) { dropdown.classList.remove('show'); document.removeEventListener('click', closeMenu); } };
            setTimeout(() => document.addEventListener('click', closeMenu), 10);
        };

        window.sharePostMenu = () => { closeDropdown(); openShareModal(activePostId); };
        window.bookmarkPostMenu = () => { closeDropdown(); bookmarkPost(activePostId); };
        window.copyPostLinkMenu = () => { closeDropdown(); copyToClipboard(window.location.href + '?post=' + activePostId); showToast('Link copied!', 'success'); };
        window.muteUserMenu = () => { closeDropdown(); muteUser(activePostId); };
        window.reportPostMenu = () => { closeDropdown(); openReportModal(activePostId); };
        window.editPostMenu = () => { closeDropdown(); showToast('Edit feature coming soon!', 'info'); };
        window.deletePostMenu = async () => {
            closeDropdown();
            const post = demoPosts.find(p => p.id === activePostId);
            if (post) {
                const idx = demoPosts.indexOf(post);
                if (idx > -1) demoPosts.splice(idx, 1);
                if (firebaseReady && db) await deleteDoc(doc(db, 'posts', activePostId));
                renderDemoPosts();
                showToast('Post deleted', 'success');
            }
        };

        function closeDropdown() { document.getElementById('postMenuDropdown').classList.remove('show'); }

        window.bookmarkPost = async (postId) => {
            if (!currentUserData.savedPosts) currentUserData.savedPosts = [];
            const idx = currentUserData.savedPosts.indexOf(postId);
            if (idx > -1) currentUserData.savedPosts.splice(idx, 1);
            else currentUserData.savedPosts.push(postId);
            if (firebaseReady && db) {
                await updateDoc(doc(db, 'users', currentUser.uid), { savedPosts: currentUserData.savedPosts });
            }
            renderDemoPosts();
            showToast(idx > -1 ? 'Removed from saved' : 'Saved to bookmarks!', 'success');
        };

        window.muteUser = async (postId) => {
            const post = demoPosts.find(p => p.id === postId);
            if (!post) return;
            if (!currentUserData.mutedUsers) currentUserData.mutedUsers = [];
            const idx = currentUserData.mutedUsers.indexOf(post.userId);
            if (idx > -1) { currentUserData.mutedUsers.splice(idx, 1); showToast('Unmuted user', 'success'); }
            else { currentUserData.mutedUsers.push(post.userId); showToast('User muted', 'info'); }
            if (firebaseReady && db) {
                await updateDoc(doc(db, 'users', currentUser.uid), { mutedUsers: currentUserData.mutedUsers });
            }
            renderDemoPosts();
        };

        window.openReportModal = (postId) => {
            activePostId = postId;
            selectedReportReason = null;
            document.querySelectorAll('.report-reason').forEach(r => r.classList.remove('selected'));
            document.getElementById('reportModal').classList.add('show');
        };

        window.selectReportReason = (el) => {
            document.querySelectorAll('.report-reason').forEach(r => r.classList.remove('selected'));
            el.classList.add('selected');
            selectedReportReason = el.textContent;
        };

        window.submitReport = async () => {
            if (!selectedReportReason) { showToast('Select a reason first', 'error'); return; }
            const post = demoPosts.find(p => p.id === activePostId);
            if (post) {
                if (!post.reportedBy) post.reportedBy = [];
                post.reportedBy.push(currentUser.uid);
                if (firebaseReady && db) {
                    await updateDoc(doc(db, 'posts', activePostId), { reportedBy: post.reportedBy });
                }
            }
            closeModal('reportModal');
            showToast('Report submitted. Thank you!', 'success');
        };

        window.openShareModal = (postId) => {
            activePostId = postId;
            const url = window.location.origin + window.location.pathname + '?post=' + postId;
            document.getElementById('shareLinkInput').value = url;
            document.getElementById('shareModal').classList.add('show');
        };

        window.shareTo = (platform) => {
            const url = document.getElementById('shareLinkInput').value;
            const text = 'Check out this post on LASU GradeTracker!';
            let shareUrl = '';
            switch(platform) {
                case 'whatsapp': shareUrl = `https://wa.me/?text=${encodeURIComponent(text + ' ' + url)}`; break;
                case 'facebook': shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`; break;
                case 'twitter': shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`; break;
                case 'native': if (navigator.share) { navigator.share({ title: 'LASU GradeTracker', text, url }); return; }
                case 'copy': copyToClipboard(url); showToast('Link copied!', 'success'); return;
            }
            if (shareUrl) window.open(shareUrl, '_blank');
            closeModal('shareModal');
        };

        window.copyShareLink = () => {
            copyToClipboard(document.getElementById('shareLinkInput').value);
            showToast('Link copied!', 'success');
        };

        window.resharePost = async () => {
            const post = demoPosts.find(p => p.id === activePostId);
            if (post) {
                const newPost = {
                    id: 'post' + Date.now(), userId: currentUser.uid,
                    text: `Reshared from @${demoUsers[post.userId]?.displayName || 'unknown'}:\n\n${post.text}`,
                    image: post.image, createdAt: Date.now(),
                    reactions: {}, comments: [], shares: 0, bookmarks: [], mutedBy: [], reportedBy: []
                };
                demoPosts.unshift(newPost);
                post.shares++;
                if (firebaseReady && db) {
                    await addDoc(collection(db, 'posts'), newPost);
                    await updateDoc(doc(db, 'posts', activePostId), { shares: increment(1) });
                }
                renderDemoPosts();
                showToast('Reshared!', 'success');
            }
            closeModal('shareModal');
        };

        window.viewProfile = (userId) => {
            const user = demoUsers[userId];
            if (!user) return;
            const isMe = userId === currentUser?.uid;
            const isFollowing = currentUserData?.followingUsers?.includes(userId);
            const userPosts = demoPosts.filter(p => p.userId === userId);

            document.getElementById('profileModalBody').innerHTML = `
                <div class="profile-header">
                    <img src="${user.avatar}" class="profile-avatar-large" alt="${user.displayName}">
                    <div class="profile-name">${user.displayName}
                        <div class="badges-row">${user.badges.map(b => `<span class="badge ${b}" title="${getBadgeTitle(b)}"></span>`).join('')}</div>
                    </div>
                    <div class="profile-badges">${user.badges.map(b => `<span style="font-size:0.75rem;color:var(--text-secondary);background:rgba(245,158,11,0.1);padding:2px 8px;border-radius:4px;">${getBadgeTitle(b)}</span>`).join('')}</div>
                    <div class="profile-stats-row">
                        <div class="profile-stat"><div class="profile-stat-value">${user.postsCount}</div><div class="profile-stat-label">Posts</div></div>
                        <div class="profile-stat"><div class="profile-stat-value">${user.followers}</div><div class="profile-stat-label">Followers</div></div>
                        <div class="profile-stat"><div class="profile-stat-value">${user.following}</div><div class="profile-stat-label">Following</div></div>
                    </div>
                    <p class="profile-bio">${user.bio || 'No bio yet'}</p>
                    ${user.department ? `<p style="color:var(--text-muted);font-size:0.8rem;margin-top:4px;">${user.department} ${user.level ? '| ' + user.level : ''}</p>` : ''}
                    <div class="profile-actions">
                        ${!isMe ? `<button class="profile-btn primary" onclick="toggleFollowProfile('${userId}')">${isFollowing ? 'Following' : 'Follow'}</button>` : ''}
                        ${!isMe ? `<button class="profile-btn secondary" onclick="muteUserProfile('${userId}')">${currentUserData?.mutedUsers?.includes(userId) ? 'Unmute' : 'Mute'}</button>` : ''}
                        ${isMe ? `<button class="profile-btn primary" onclick="closeModal('profileModal'); openEditProfile();">Edit Profile</button>` : ''}
                    </div>
                </div>
                <div class="profile-posts">
                    <h3>Recent Posts (${userPosts.length})</h3>
                    ${userPosts.length === 0 ? '<p style="color:var(--text-muted);text-align:center;padding:20px;">No posts yet</p>' : 
                      userPosts.map(p => `<div style="padding:12px;background:rgba(255,255,255,0.02);border-radius:10px;margin-bottom:10px;">
                        <p style="font-size:0.9rem;color:var(--text-primary);margin-bottom:6px;">${p.text.substring(0, 120)}${p.text.length > 120 ? '...' : ''}</p>
                        <p style="font-size:0.75rem;color:var(--text-muted);">${getTimeAgo(p.createdAt)} · ${Object.values(p.reactions).flat().length} reactions · ${p.comments.length} comments</p>
                      </div>`).join('')}
                </div>
            `;
            document.getElementById('profileModal').classList.add('show');
        };

        window.viewProfileByName = (name) => {
            const user = Object.values(demoUsers).find(u => u.displayName.toLowerCase() === name.toLowerCase());
            if (user) viewProfile(user.uid);
        };

        window.toggleFollow = async (userId, btn) => {
            if (!currentUserData.followingUsers) currentUserData.followingUsers = [];
            const idx = currentUserData.followingUsers.indexOf(userId);
            const targetUser = demoUsers[userId];
            if (idx > -1) {
                currentUserData.followingUsers.splice(idx, 1);
                if (targetUser) targetUser.followers--;
                btn.textContent = 'Follow';
                btn.classList.remove('following');
                showToast(`Unfollowed ${targetUser?.displayName || 'user'}`, 'info');
            } else {
                currentUserData.followingUsers.push(userId);
                if (targetUser) targetUser.followers++;
                btn.textContent = 'Following';
                btn.classList.add('following');
                showToast(`Following ${targetUser?.displayName || 'user'}!`, 'success');
            }
            if (firebaseReady && db) {
                await updateDoc(doc(db, 'users', currentUser.uid), { followingUsers: currentUserData.followingUsers });
            }
        };

        window.toggleFollowProfile = async (userId) => {
            if (!currentUserData.followingUsers) currentUserData.followingUsers = [];
            const idx = currentUserData.followingUsers.indexOf(userId);
            const targetUser = demoUsers[userId];
            if (idx > -1) {
                currentUserData.followingUsers.splice(idx, 1);
                if (targetUser) targetUser.followers--;
                showToast(`Unfollowed ${targetUser?.displayName || 'user'}`, 'info');
            } else {
                currentUserData.followingUsers.push(userId);
                if (targetUser) targetUser.followers++;
                showToast(`Following ${targetUser?.displayName || 'user'}!`, 'success');
            }
            if (firebaseReady && db) {
                await updateDoc(doc(db, 'users', currentUser.uid), { followingUsers: currentUserData.followingUsers });
            }
            viewProfile(userId);
        };

        window.muteUserProfile = async (userId) => {
            if (!currentUserData.mutedUsers) currentUserData.mutedUsers = [];
            const idx = currentUserData.mutedUsers.indexOf(userId);
            if (idx > -1) { currentUserData.mutedUsers.splice(idx, 1); showToast('Unmuted user', 'success'); }
            else { currentUserData.mutedUsers.push(userId); showToast('User muted', 'info'); }
            if (firebaseReady && db) {
                await updateDoc(doc(db, 'users', currentUser.uid), { mutedUsers: currentUserData.mutedUsers });
            }
            viewProfile(userId);
        };

        window.openEditProfile = () => {
            if (!currentUserData) return;
            document.getElementById('editDisplayName').value = currentUserData.displayName || '';
            document.getElementById('editBio').value = currentUserData.bio || '';
            document.getElementById('editDepartment').value = currentUserData.department || '';
            document.getElementById('editLevel').value = currentUserData.level || '';
            document.getElementById('editProfileModal').classList.add('show');
        };

        function initAvatarPicker() {
            const picker = document.getElementById('avatarPicker');
            picker.innerHTML = AVATAR_SEEDS.map(seed => 
                `<img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${seed}&style=circle" class="avatar-option ${selectedAvatar === seed ? 'selected' : ''}" onclick="selectAvatar('${seed}', this)" alt="Avatar">`
            ).join('');
        }

        window.selectAvatar = (seed, el) => {
            selectedAvatar = seed;
            document.querySelectorAll('.avatar-option').forEach(a => a.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('editProfileAvatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${seed}&style=circle`;
        };

        window.saveProfile = async () => {
            const displayName = document.getElementById('editDisplayName').value.trim();
            const bio = document.getElementById('editBio').value.trim();
            const department = document.getElementById('editDepartment').value.trim();
            const level = document.getElementById('editLevel').value.trim();

            if (!displayName) { showToast('Display name is required', 'error'); return; }

            const updates = { displayName, bio, department, level };
            if (selectedAvatar) updates.avatar = `https://api.dicebear.com/7.x/avataaars/svg?seed=${selectedAvatar}&style=circle`;

            Object.assign(currentUserData, updates);
            if (firebaseReady && db) {
                await updateDoc(doc(db, 'users', currentUser.uid), updates);
            }
            updateHeader();
            closeModal('editProfileModal');
            showToast('Profile updated!', 'success');
        };

        window.closeModal = (id) => { document.getElementById(id).classList.remove('show'); };

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
            toast.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(20px)'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function copyToClipboard(text) {
            if (navigator.clipboard) navigator.clipboard.writeText(text);
            else {
                const ta = document.createElement('textarea');
                ta.value = text; document.body.appendChild(ta); ta.select();
                document.execCommand('copy'); document.body.removeChild(ta);
            }
        }

        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('show'); });
        });

        document.addEventListener('input', (e) => {
            if (e.target.tagName === 'TEXTAREA' && e.target.classList.contains('comment-input')) {
                e.target.style.height = 'auto';
                e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
            }
        });

        init();
    </script>
</body>
</html>
