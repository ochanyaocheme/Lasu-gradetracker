<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator - LASU GradeTracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #0d1b2a;
            color: #ffffff;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0;
            padding-bottom: 40px;
        }

        /* ===== HEADER matching the image ===== */
        .brand-header {
            background-color: #162236;
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            text-decoration: none;
            flex-shrink: 0;
            transition: background-color 0.2s ease;
        }
        .back-btn:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }
        .back-btn svg {
            width: 18px;
            height: 18px;
        }
        .brand-logo {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 10px;
            flex-shrink: 0;
        }
        .brand-title {
            font-size: 20px;
            font-weight: 700;
        }
        /* LASU = orange, GradeTracker = white */
        .brand-title .lasu-text { color: #e9a319; }
        .brand-title .gradetracker-text { color: #ffffff; }

        /* ===== CONTENT ===== */
        .content-area {
            padding: 20px;
            padding-bottom: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-top: 10px;
        }
        .header h1 {
            color: #e9a319;
            font-size: 1.6rem;
            font-weight: 700;
        }
        .header p {
            color: #8899b0;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        .card {
            background-color: #162236;
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 15px;
        }
        .card h3 {
            color: #e9a319;
            margin-bottom: 18px;
            font-size: 1.1rem;
            font-weight: 700;
        }
        .card p {
            color: #8899b0;
            font-size: 0.85rem;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .input-group {
            margin-bottom: 14px;
        }
        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: #8899b0;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #233554;
            border-radius: 10px;
            background-color: #0d1b2a;
            color: #ffffff;
            font-size: 0.9rem;
            outline: none;
        }
        .input-group input:focus, .input-group select:focus {
            border-color: #e9a319;
        }
        .course-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }
        .course-row input, .course-row select {
            flex: 1;
            padding: 10px;
            border: 1px solid #233554;
            border-radius: 8px;
            background-color: #0d1b2a;
            color: #ffffff;
            font-size: 0.85rem;
            outline: none;
        }
        .course-row input:focus, .course-row select:focus {
            border-color: #e9a319;
        }
        .course-row input.course-code {
            flex: 1.5;
        }
        .course-row .remove-btn {
            background-color: #e85d4e;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-primary {
            background-color: #1b998b;
            color: white;
        }
        .btn-secondary {
            background-color: #e9a319;
            color: #0d1b2a;
        }
        .btn-whatsapp {
            background-color: #25d366;
            color: white;
        }
        .btn-copy {
            background-color: #2a5298;
            color: white;
        }
        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .result-box {
            background-color: #0d1b2a;
            border: 2px solid #1b998b;
            border-radius: 12px;
            padding: 20px;
            margin-top: 18px;
            text-align: center;
        }
        .result-box h4 {
            color: #e9a319;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .result-box .value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1b998b;
        }
        .result-box .label {
            font-size: 0.85rem;
            color: #8899b0;
            margin-top: 5px;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .action-buttons .btn {
            flex: 1;
            margin-top: 0;
            padding: 10px;
            font-size: 0.8rem;
        }
        .prediction-box {
            background-color: #1a2d4a;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            text-align: left;
        }
        .prediction-box h5 {
            color: #e9a319;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }
        .prediction-box p {
            color: #8899b0;
            font-size: 0.8rem;
            line-height: 1.5;
            margin: 0;
        }
        .prediction-box .highlight {
            color: #1b998b;
            font-weight: 700;
        }
        .grade-legend {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 15px;
        }
        .grade-item {
            background-color: #0d1b2a;
            padding: 10px 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            align-items: center;
        }
        .grade-item .points {
            font-weight: 700;
            color: #e9a319;
            font-size: 0.9rem;
        }
        .grade-item .range {
            color: #8899b0;
        }
        .hidden {
            display: none !important;
        }
        .message {
            font-size: 0.85rem;
            margin-top: 8px;
            font-weight: 500;
        }
        .error { color: #e85d4e; }
        .success { color: #1b998b; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #1b998b;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 1000;
            animation: fadeInOut 3s ease;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            10% { opacity: 1; transform: translateX(-50%) translateY(0); }
            90% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER matching the image -->
        <header class="brand-header">
            <a href="calculator.html" class="back-btn">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
                </svg>
            </a>
            <img src="your-logo.png" alt="LASU GradeTracker" class="brand-logo">
            <h1 class="brand-title"><span class="lasu-text">LASU</span> <span class="gradetracker-text">GradeTracker</span></h1>
        </header>

        <div class="content-area">
            <div class="header">
                <h1>🧮 GPA Calculator</h1>
                <p>Calculate your semester GPA</p>
            </div>

            <div class="card">
                <h3>Add Your Courses</h3>
                <p>Enter your courses, grades, and units for this semester</p>
                <div id="gpa-courses">
                    <div class="course-row">
                        <input type="text" placeholder="Course (e.g. CHM 101)" class="course-code">
                        <select class="course-grade">
                            <option value="">Points</option>
                            <option value="5">5 (70-100)</option>
                            <option value="4">4 (60-69)</option>
                            <option value="3">3 (50-59)</option>
                            <option value="2">2 (45-49)</option>
                            <option value="1">1 (40-44)</option>
                            <option value="0">0 (0-39)</option>
                        </select>
                        <input type="number" placeholder="Units" class="course-units" min="1" max="26">
                        <button class="remove-btn" onclick="removeCourse(this)">×</button>
                    </div>
                </div>
                <button class="btn btn-secondary" onclick="addCourse()">+ Add Course</button>
                <button class="btn btn-primary" onclick="calculateGPA()">Calculate GPA</button>

                <div id="gpa-result" class="result-box hidden">
                    <h4>Your Semester GPA</h4>
                    <div class="value" id="gpa-value">0.00</div>
                    <div class="label">out of 5.0</div>
                    <div class="message" id="gpa-message"></div>

                    <div class="prediction-box hidden" id="prediction-box">
                        <h5>📈 Prediction</h5>
                        <p id="prediction-text"></p>
                    </div>

                    <div class="action-buttons">
                        <button class="btn btn-copy" onclick="copyResult()">📋 Copy</button>
                        <button class="btn btn-whatsapp" onclick="shareWhatsApp()">💬 WhatsApp</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>LASU Grading System</h3>
                <div class="grade-legend">
                    <div class="grade-item"><span class="points">5</span><span class="range">70-100</span></div>
                    <div class="grade-item"><span class="points">4</span><span class="range">60-69</span></div>
                    <div class="grade-item"><span class="points">3</span><span class="range">50-59</span></div>
                    <div class="grade-item"><span class="points">2</span><span class="range">45-49</span></div>
                    <div class="grade-item"><span class="points">1</span><span class="range">40-44</span></div>
                    <div class="grade-item"><span class="points">0</span><span class="range">0-39</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentGPA = 0;
        let currentTotalUnits = 0;

        function addCourse() {
            const container = document.getElementById('gpa-courses');
            const newRow = document.createElement('div');
            newRow.className = 'course-row';
            newRow.innerHTML = `
                <input type="text" placeholder="Course (e.g. CHM 101)" class="course-code">
                <select class="course-grade">
                    <option value="">Points</option>
                    <option value="5">5 (70-100)</option>
                    <option value="4">4 (60-69)</option>
                    <option value="3">3 (50-59)</option>
                    <option value="2">2 (45-49)</option>
                    <option value="1">1 (40-44)</option>
                    <option value="0">0 (0-39)</option>
                </select>
                <input type="number" placeholder="Units" class="course-units" min="1" max="26">
                <button class="remove-btn" onclick="removeCourse(this)">×</button>`;
            container.appendChild(newRow);
        }

        function removeCourse(btn) {
            const row = btn.parentElement;
            const container = row.parentElement;
            if (container.querySelectorAll('.course-row').length > 1) {
                row.remove();
            }
        }

        function calculateGPA() {
            const rows = document.querySelectorAll('#gpa-courses .course-row');
            let totalPoints = 0, totalUnits = 0;
            let validEntries = 0;

            rows.forEach(row => {
                const grade = parseFloat(row.querySelector('.course-grade').value);
                const units = parseFloat(row.querySelector('.course-units').value);
                if (!isNaN(grade) && !isNaN(units) && units > 0) {
                    totalPoints += grade * units;
                    totalUnits += units;
                    validEntries++;
                }
            });

            const resultBox = document.getElementById('gpa-result');
            const valueEl = document.getElementById('gpa-value');
            const messageEl = document.getElementById('gpa-message');
            const predictionBox = document.getElementById('prediction-box');
            const predictionText = document.getElementById('prediction-text');

            if (validEntries === 0) {
                messageEl.textContent = 'Please enter at least one course with grade and units.';
                messageEl.className = 'message error';
                resultBox.classList.remove('hidden');
                predictionBox.classList.add('hidden');
                valueEl.textContent = '0.00';
                return;
            }

            const gpa = totalUnits > 0 ? (totalPoints / totalUnits) : 0;
            currentGPA = gpa;
            currentTotalUnits = totalUnits;
            valueEl.textContent = gpa.toFixed(2);

            let classification = '';
            if (gpa >= 4.50) classification = 'First Class Honours 🏆';
            else if (gpa >= 3.50) classification = 'Second Class Upper 🥇';
            else if (gpa >= 2.40) classification = 'Second Class Lower';
            else if (gpa >= 1.50) classification = 'Third Class';
            else classification = 'Pass';

            messageEl.innerHTML = `Total Units: ${totalUnits} | ${classification}`;
            messageEl.className = 'message success';

            let targetCGPA = 3.5;
            if (gpa >= 4.5) targetCGPA = 4.8;
            else if (gpa >= 3.5) targetCGPA = 4.5;
            else if (gpa >= 2.4) targetCGPA = 3.5;
            else targetCGPA = 2.4;

            let neededGPA = ((targetCGPA * (totalUnits + 24)) - (gpa * totalUnits)) / 24;
            if (neededGPA > 5.0) neededGPA = 5.0;
            if (neededGPA < 0) neededGPA = 0;

            let nextClass = '';
            if (gpa < 4.5) nextClass = 'First Class';
            else if (gpa < 3.5) nextClass = '2:1 (Second Class Upper)';
            else if (gpa < 2.4) nextClass = '2:2 (Second Class Lower)';
            else nextClass = 'a higher CGPA';

            predictionText.innerHTML = `To reach <span class="highlight">${nextClass}</span> next semester, you need at least <span class="highlight">${neededGPA.toFixed(2)} GPA</span> in your next 24 units.`;
            predictionBox.classList.remove('hidden');

            resultBox.classList.remove('hidden');
        }

        function copyResult() {
            const gpa = document.getElementById('gpa-value').textContent;
            const message = document.getElementById('gpa-message').textContent;
            const text = `My LASU Semester GPA: ${gpa}/5.0
${message}

Calculated with LASU GradeTracker 📊`;

            navigator.clipboard.writeText(text).then(() => {
                showToast('Result copied to clipboard!');
            }).catch(() => {
                showToast('Failed to copy. Try again.');
            });
        }

        function shareWhatsApp() {
            const gpa = document.getElementById('gpa-value').textContent;
            const message = document.getElementById('gpa-message').textContent;
            const text = `My LASU Semester GPA: ${gpa}/5.0
${message}

Calculated with LASU GradeTracker 📊`;
            const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
