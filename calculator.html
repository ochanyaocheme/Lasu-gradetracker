<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Calculator - LASU GradeTracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #0d1b2a;
            color: #ffffff;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 10px;
        }
        .back-btn {
            display: inline-block;
            color: #e9a319;
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .header h1 {
            color: #e9a319;
            font-size: 1.6rem;
            font-weight: 700;
        }
        .header p {
            color: #8899b0;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        .tool-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .tool-item {
            display: flex;
            align-items: center;
            padding: 20px;
            border-radius: 16px;
            text-decoration: none;
            color: #ffffff;
            transition: transform 0.2s;
        }
        .tool-item:hover {
            transform: translateY(-2px);
        }
        .tool-item .icon {
            font-size: 2rem;
            margin-right: 18px;
            width: 45px;
            text-align: center;
        }
        .tool-item .info {
            flex: 1;
        }
        .tool-item .label {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 3px;
        }
        .tool-item .sublabel {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
        }
        .tool-item .arrow {
            font-size: 1.3rem;
            margin-left: 10px;
        }
        .tool-gpa {
            background-color: #1b998b;
        }
        .tool-cgpa {
            background-color: #e9a319;
            color: #0d1b2a;
        }
        .tool-cgpa .sublabel {
            color: rgba(13, 27, 42, 0.7);
        }
        .tool-target {
            background-color: #e85d4e;
        }
        .tool-planner {
            background-color: #2a5298;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">← Back to Home</a>
            <h1>📊 CGPA Calculator</h1>
            <p>Choose a tool to get started</p>
        </div>

        <div class="tool-list">
            <a href="gpa-calculator.html" class="tool-item tool-gpa">
                <span class="icon">🧮</span>
                <div class="info">
                    <div class="label">GPA Calculator</div>
                    <div class="sublabel">Calculate one semester GPA</div>
                </div>
                <span class="arrow">›</span>
            </a>
            <a href="cgpa-calculator.html" class="tool-item tool-cgpa">
                <span class="icon">📈</span>
                <div class="info">
                    <div class="label">CGPA Calculator</div>
                    <div class="sublabel">Calculate cumulative GPA</div>
                </div>
                <span class="arrow">›</span>
            </a>
            <a href="target-predictor.html" class="tool-item tool-target">
                <span class="icon">🎯</span>
                <div class="info">
                    <div class="label">Target Grade Predictor</div>
                    <div class="sublabel">What grades do you need?</div>
                </div>
                <span class="arrow">›</span>
            </a>
            <a href="semester-planner.html" class="tool-item tool-planner">
                <span class="icon">📅</span>
                <div class="info">
                    <div class="label">Semester Planner</div>
                    <div class="sublabel">Plan ahead and project CGPA</div>
                </div>
                <span class="arrow">›</span>
            </a>
        </div>
    </div>
</body>

                    <div class="label message" id="planner-message"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Setup click handlers for tool cards
        document.getElementById('card-gpa').addEventListener('click', function() {
            switchTool('gpa', this);
        });
        document.getElementById('card-cgpa').addEventListener('click', function() {
            switchTool('cgpa', this);
        });
        document.getElementById('card-target').addEventListener('click', function() {
            switchTool('target', this);
        });
        document.getElementById('card-planner').addEventListener('click', function() {
            switchTool('planner', this);
        });

        function switchTool(toolId, cardElement) {
            // Hide all tool sections
            document.querySelectorAll('.tool-section').forEach(function(section) {
                section.classList.remove('active');
            });
            // Remove active from all cards
            document.querySelectorAll('.tool-card').forEach(function(card) {
                card.classList.remove('active');
            });
            // Show selected section
            document.getElementById(toolId).classList.add('active');
            // Activate selected card
            cardElement.classList.add('active');
        }

        function addCourse(containerId) {
            const container = document.getElementById(containerId);
            const newRow = document.createElement('div');
            newRow.className = 'course-row';
            newRow.innerHTML = containerId === 'planner-courses' 
                ? '<input type="text" placeholder="Course code" class="plan-code">'
                  + '<select class="plan-grade">'
                  + '<option value="">Points</option>'
                  + '<option value="5">5 Points (70-100)</option>'
                  + '<option value="4">4 Points (60-69)</option>'
                  + '<option value="3">3 Points (50-59)</option>'
                  + '<option value="2">2 Points (45-49)</option>'
                  + '<option value="1">1 Point (40-44)</option>'
                  + '<option value="0">0 Points (0-39)</option>'
                  + '</select>'
                  + '<input type="number" placeholder="Units" class="plan-units" min="1" max="6">'
                  + '<button class="remove-btn" onclick="removeCourse(this)">×</button>'
                : '<input type="text" placeholder="Course (e.g. CHM 101)" class="course-code">'
                  + '<select class="course-grade">'
                  + '<option value="">Points</option>'
                  + '<option value="5">5 Points (70-100)</option>'
                  + '<option value="4">4 Points (60-69)</option>'
                  + '<option value="3">3 Points (50-59)</option>'
                  + '<option value="2">2 Points (45-49)</option>'
                  + '<option value="1">1 Point (40-44)</option>'
                  + '<option value="0">0 Points (0-39)</option>'
                  + '</select>'
                  + '<input type="number" placeholder="Units" class="course-units" min="1" max="6">'
                  + '<button class="remove-btn" onclick="removeCourse(this)">×</button>';
            container.appendChild(newRow);
        }

        function removeCourse(btn) {
            btn.parentElement.remove();
        }

        function calculateGPA() {
            const rows = document.querySelectorAll('#gpa-courses .course-row');
            let totalPoints = 0, totalUnits = 0;

            rows.forEach(function(row) {
                const grade = parseFloat(row.querySelector('.course-grade').value);
                const units = parseFloat(row.querySelector('.course-units').value);
                if (grade && units) {
                    totalPoints += grade * units;
                    totalUnits += units;
                }
            });

            const gpa = totalUnits > 0 ? (totalPoints / totalUnits).toFixed(2) : '0.00';
            document.getElementById('gpa-value').textContent = gpa;
            document.getElementById('gpa-result').classList.remove('hidden');
        }

        let semesterCount = 1;
        function addSemester() {
            semesterCount++;
            const container = document.getElementById('semesters');
            const div = document.createElement('div');
            d"grade-item"><span class="grade">B</span><span class="points">60-69 = 4.0</span></div>
                    <div class="grade-item"><span class="grade">C</span><span class="points">50-59 = 3.0</span></div>
                    <div class="grade-item"><span class="grade">D</span><span class="points">45-49 = 2.0</span></div>
                    <div class="grade-item"><span class="grade">E</span><span class="points">40-44 = 1.0</span></div>
                    <div class="grade-item"><span class="grade">F</span><span class="points">0-39 = 0.0</span></div>
                </div>
            </div>
        </div>

        <div id="cgpa" class="tool-section">
            <div class="card">
                <h3>Calculate Your CGPA</h3>
                <p>Add all your past semesters to get your cumulative GPA</p>
                <div id="semesters">
                    <div class="input-group">
                        <label>Semester 1 GPA</label>
                        <input type="number" step="0.01" min="0" max="5" class="sem-gpa" placeholder="e.g. 4.25">
                    </div>
                    <div class="input-group">
                        <label>Semester 1 Total Units</label>
                        <input type="number" class="sem-units" placeholder="e.g. 24">
                    </div>
                </div>
                <button class="btn btn-secondary" onclick="addSemester()">+ Add Another Semester</button>
                <button class="btn btn-primary" onclick="calculateCGPA()">Calculate CGPA</button>
                <div id="cgpa-result" class="result-box hidden">
                    <h4>Your CGPA</h4>
                    <div class="value" id="cgpa-value">0.00</div>
                    <div class="label">Cumulative Grade Point Average</div>
                </div>
            </div>
        </div>

        <div id="target" class="tool-section">
            <div class="card">
                <h3>Target Grade Predictor</h3>
                <p>"What grades do I need to reach my target CGPA?"</p>
                <div class="input-group">
                    <label>Current CGPA</label>
                    <input type="number" step="0.01" min="0" max="5" id="current-cgpa" placeholder="e.g. 3.50">
                </div>
                <div class="input-group">
                    <label>Total Units Completed</label>
                    <input type="number" id="completed-units" placeholder="e.g. 60">
                </div>
                <div class="input-group">
                    <label>Target CGPA</label>
                    <input type="number" step="0.01" min="0" max="5" id="target-cgpa" placeholder="e.g. 4.00">
                </div>
                <div class="input-group">
                    <label>Remaining Units This Semester</label>
                    <input type="number" id="remaining-units" placeholder="e.g. 24">
                </div>
                <button class="btn btn-primary" onclick="predictTarget()">Calculate Required GPA</button>
                <div id="target-result" class="result-box hidden">
                    <h4>Required GPA This Semester</h4>
                    <div class="value" id="target-value">0.00</div>
                    <div class="label message" id="target-message"></div>
                </div>
            </div>
        </div>

        <div id="planner" class="tool-section">
            <div class="card">
                <h3>Semester Planner</h3>
                <p>Plan your courses and see your projected CGPA</p>
                <div class="input-group">
                    <label>Current CGPA (optional)</label>
                    <input type="number" step="0.01" min="0" max="5" id="planner-current-cgpa" placeholder="Leave blank if first semester">
                </div>
                <div class="input-group">
                    <label>Current Total Units (optional)</label>
                    <input type="number" id="planner-current-units" placeholder="Leave blank if first semester">
                </div>
                <div id="planner-courses">
                    <div class="course-row">
                        <input type="text" placeholder="Course code" class="plan-code">
                        <select class="plan-grade">
                            <option value="">Expected Grade</option>
                            <option value="5">A</option>
                            <option value="4">B</option>
                            <option value="3">C</option>
                            <option value="2">D</option>
                            <option value="1">E</option>
                            <option value="0">F</option>
                        </select>
                        <input type="number" placeholder="Units" class="plan-units" min="1" max="6">
                        <button class="remove-btn" onclick="removeCourse(this)">×</button>
                    </div>
                </div>
                <button class="btn btn-secondary" onclick="addCourse('planner-courses')">+ Add Course</button>
                <button class="btn btn-primary" onclick="calculatePlanner()">Project My CGPA</button>
                <div id="planner-result" class="result-box hidden">
                    <h4>Projected CGPA</h4>
                    <div class="value" id="planner-value">0.00</div>
                    <div class="label message" id="planner-message"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showTool(toolId) {
            document.querySelectorAll('.tool-section').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tool-card').forEach(t => t.classList.remove('active'));
            document.getElementById(toolId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function addCourse(containerId) {
            const container = document.getElementById(containerId);
            const newRow = document.createElement('div');
            newRow.className = 'course-row';
            newRow.innerHTML = containerId === 'planner-courses' 
                ? `<input type="text" placeholder="Course code" class="plan-code">
                   <select class="plan-grade">
                       <option value="">Expected Grade</option>
                       <option value="5">A</option>
                       <option value="4">B</option>
                       <option value="3">C</option>
                       <option value="2">D</option>
                       <option value="1">E</option>
                       <option value="0">F</option>
                   </select>
                   <input type="number" placeholder="Units" class="plan-units" min="1" max="6">
                   <button class="remove-btn" onclick="removeCourse(this)">×</button>`
                : `<input type="text" placeholder="Course (e.g. CHM 101)" class="course-code">
                   <select class="course-grade">
                       <option value="">Grade</option>
                       <option value="5">A (70-100)</option>
                       <option value="4">B (60-69)</option>
                       <option value="3">C (50-59)</option>
                       <option value="2">D (45-49)</option>
                       <option value="1">E (40-44)</option>
                       <option value="0">F (0-39)</option>
                   </select>
                   <input type="number" placeholder="Units" class="course-units" min="1" max="6">
                   <button class="remove-btn" onclick="removeCourse(this)">×</button>`;
            container.appendChild(newRow);
        }

        function removeCourse(btn) {
            btn.parentElement.remove();
        }

        function calculateGPA() {
            const rows = document.querySelectorAll('#gpa-courses .course-row');
            let totalPoints = 0, totalUnits = 0;
            
            rows.forEach(row => {
                const grade = parseFloat(row.querySelector('.course-grade').value);
                const units = parseFloat(row.querySelector('.course-units').value);
                if (grade && units) {
                    totalPoints += grade * units;
                    totalUnits += units;
                }
            });

            const gpa = totalUnits > 0 ? (totalPoints / totalUnits).toFixed(2) : '0.00';
            document.getElementById('gpa-value').textContent = gpa;
            document.getElementById('gpa-result').classList.remove('hidden');
        }

        let semesterCount = 1;
        function addSemester() {
            semesterCount++;
            const container = document.getElementById('semesters');
            const div = document.createElement('div');
            div.innerHTML = `
                <div class="input-group">
                    <label>Semester ${semesterCount} GPA</label>
                    <input type="number" step="0.01" min="0" max="5" class="sem-gpa" placeholder="e.g. 4.25">
                </div>
                <div class="input-group">
                    <label>Semester ${semesterCount} Total Units</label>
                    <input type="number" class="sem-units" placeholder="e.g. 24">
                </div>
            `;
            container.appendChild(div);
        }

        function calculateCGPA() {
            const gpas = document.querySelectorAll('.sem-gpa');
            const units = document.querySelectorAll('.sem-units');
            let totalPoints = 0, totalUnits = 0;

            for (let i = 0; i < gpas.length; i++) {
                const gpa = parseFloat(gpas[i].value);
                const unit = parseFloat(units[i].value);
                if (gpa && unit) {
                    totalPoints += gpa * unit;
                    totalUnits += unit;
                }
            }

            const cgpa = totalUnits > 0 ? (totalPoints / totalUnits).toFixed(2) : '0.00';
            document.getElementById('cgpa-value').textContent = cgpa;
            document.getElementById('cgpa-result').classList.remove('hidden');
        }

        function predictTarget() {
            const currentCGPA = parseFloat(document.getElementById('current-cgpa').value);
            const completedUnits = parseFloat(document.getElementById('completed-units').value);
            const targetCGPA = parseFloat(document.getElementById('target-cgpa').value);
            const remainingUnits = parseFloat(document.getElementById('remaining-units').value);

            if (!currentCGPA || !completedUnits || !targetCGPA || !remainingUnits) {
                alert('Please fill in all fields');
                return;
            }

            const totalUnits = completedUnits + remainingUnits;
            const requiredTotalPoints = targetCGPA * totalUnits;
            const currentPoints = currentCGPA * completedUnits;
            const neededPoints = requiredTotalPoints - currentPoints;
            const neededGPA = (neededPoints / remainingUnits).toFixed(2);

            document.getElementById('target-value').textContent = neededGPA;
            
            let message = '';
            let color = '';
            if (neededGPA > 5.0) {
                message = 'This target may not be achievable. Consider a lower target.';
                color = '#e85d4e';
            } else if (neededGPA > 4.5) {
                message = 'You need excellent grades. Aim for mostly As!';
                color = '#e9a319';
            } else if (neededGPA > 3.5) {
                message = 'Achievable with good effort. Aim for Bs and above!';
                color = '#1b998b';
            } else {
                message = 'Very achievable! You can do this!';
                color = '#1b998b';
            }
            const msgEl = document.getElementById('target-message');
            msgEl.textContent = message;
            msgEl.style.color = color;
            document.getElementById('target-result').classList.remove('hidden');
        }

        function calculatePlanner() {
            const rows = document.querySelectorAll('#planner-courses .course-row');
            let projectedPoints = 0, projectedUnits = 0;
            
            rows.forEach(row => {
                const grade = parseFloat(row.querySelector('.plan-grade').value);
                const units = parseFloat(row.querySelector('.plan-units').value);
                if (grade && units) {
                    projectedPoints += grade * units;
                    projectedUnits += units;
                }
            });

            const currentCGPA = parseFloat(document.getElementById('planner-current-cgpa').value) || 0;
            const currentUnits = parseFloat(document.getElementById('planner-current-units').value) || 0;
            
            const totalPoints = (currentCGPA * currentUnits) + projectedPoints;
            const totalUnits = currentUnits + projectedUnits;
            const projectedCGPA = totalUnits > 0 ? (totalPoints / totalUnits).toFixed(2) : '0.00';

            document.getElementById('planner-value').textContent = projectedCGPA;
            
            let message = '';
            if (currentCGPA > 0) {
                const diff = (projectedCGPA - currentCGPA).toFixed(2);
                if (diff > 0) {
                    message = `Your CGPA will increase by ${diff} points! 🎉`;
                } else if (diff < 0) {
                    message = `Your CGPA will decrease by ${Math.abs(diff)} points.`;
                } else {
                    message = 'Your CGPA will remain the same.';
                }
            } else {
                message = 'This will be your starting CGPA!';
            }
            document.getElementById('planner-message').textContent = message;
            document.getElementById('planner-result').classList.remove('hidden');
        }
    </script>
</body>
</html>
