<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Calculator - LASU GradeTracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #0d1b2a;
            color: #ffffff;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 10px;
        }
        .back-btn {
            display: inline-block;
            color: #e9a319;
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .header h1 {
            color: #e9a319;
            font-size: 1.6rem;
            font-weight: 700;
        }
        .header p {
            color: #8899b0;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        .tool-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .tool-item {
            display: flex;
            align-items: center;
            padding: 22px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.2s;
        }
        .tool-item:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }
        .tool-item .icon {
            font-size: 2.2rem;
            margin-right: 18px;
            width: 50px;
            text-align: center;
            flex-shrink: 0;
        }
        .tool-item .info {
            flex: 1;
        }
        .tool-item .label {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .tool-item .sublabel {
            font-size: 0.85rem;
            opacity: 0.85;
        }
        .tool-item .arrow {
            font-size: 1.5rem;
            margin-left: 10px;
            opacity: 0.7;
            flex-shrink: 0;
        }
        .tool-gpa {
            background-color: #1b998b;
        }
        .tool-cgpa {
            background-color: #e9a319;
            color: #0d1b2a;
        }
        .tool-cgpa .sublabel {
            opacity: 0.75;
        }
        .tool-cgpa .arrow {
            color: #0d1b2a;
        }
        .tool-target {
            background-color: #e85d4e;
        }
        .tool-planner {
            background-color: #2a5298;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">← Back to Home</a>
            <h1>📊 CGPA Calculator</h1>
            <p>Choose a tool to get started</p>
        </div>

        <div class="tool-list">
            <a href="gpa-calculator.html" class="tool-item tool-gpa">
                <span class="icon">🧮</span>
                <div class="info">
                    <div class="label">GPA Calculator</div>
                    <div class="sublabel">Calculate one semester GPA</div>
                </div>
                <span class="arrow">›</span>
            </a>
            <a href="cgpa-calc.html" class="tool-item tool-cgpa">
                <span class="icon">📈</span>
                <div class="info">
                    <div class="label">CGPA Calculator</div>
                    <div class="sublabel">Calculate cumulative GPA</div>
                </div>
                <span class="arrow">›</span>
            </a>
            <a href="target-predictor.html" class="tool-item tool-target">
                <span class="icon">🎯</span>
                <div class="info">
                    <div class="label">Target Grade Predictor</div>
                    <div class="sublabel">What grades do you need?</div>
                </div>
                <span class="arrow">›</span>
            </a>
            <a href="semester-planner.html" class="tool-item tool-planner">
                <span class="icon">📅</span>
                <div class="info">
                    <div class="label">Semester Planner</div>
                    <div class="sublabel">Plan ahead and project CGPA</div>
                </div>
                <span class="arrow">›</span>
            </a>
        </div>
    </div>
</body>
</html>
