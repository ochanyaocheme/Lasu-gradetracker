<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Calculator - LASU GradeTracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #0d1b2a;
            color: #ffffff;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-top: 10px;
        }
        .back-btn {
            display: inline-block;
            color: #e9a319;
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .header h1 {
            color: #e9a319;
            font-size: 1.6rem;
            font-weight: 700;
        }
        .header p {
            color: #8899b0;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        .card {
            background-color: #162236;
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 15px;
        }
        .card h3 {
            color: #e9a319;
            margin-bottom: 12px;
            font-size: 1.1rem;
            font-weight: 700;
        }
        .card p {
            color: #8899b0;
            font-size: 0.85rem;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .input-group {
            margin-bottom: 14px;
        }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #ffffff;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #233554;
            border-radius: 10px;
            background-color: #0d1b2a;
            color: #ffffff;
            font-size: 0.9rem;
            outline: none;
        }
        .input-group input:focus {
            border-color: #e9a319;
        }
        .input-group input::placeholder {
            color: #4a5d7a;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-primary {
            background-color: #e9a319;
            color: #0d1b2a;
        }
        .btn-secondary {
            background-color: #2a5298;
            color: #ffffff;
        }
        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .result-box {
            background-color: #0d1b2a;
            border: 2px solid #e9a319;
            border-radius: 12px;
            padding: 20px;
            margin-top: 18px;
            text-align: center;
        }
        .result-box h4 {
            color: #e9a319;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .result-box .value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #e9a319;
        }
        .result-box .label {
            font-size: 0.85rem;
            color: #8899b0;
            margin-top: 5px;
        }
        .semester-block {
            background-color: #0d1b2a;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
        }
        .semester-block h4 {
            color: #e9a319;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .hidden {
            display: none !important;
        }
        .message {
            font-size: 0.85rem;
            margin-top: 8px;
            font-weight: 500;
        }
        .error {
            color: #e85d4e;
        }
        .success {
            color: #1b998b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="calculator.html" class="back-btn">← Back</a>
            <h1>📈 CGPA Calculator</h1>
            <p>Calculate your cumulative GPA across semesters</p>
        </div>

        <div class="card">
            <h3>Calculate Your CGPA</h3>
            <p>Add all your past semesters to get your cumulative GPA</p>
            
            <div id="semesters">
                <div class="semester-block">
                    <h4>Semester 1</h4>
                    <div class="input-group">
                        <label>Semester 1 GPA</label>
                        <input type="number" step="0.01" min="0" max="5" class="sem-gpa" placeholder="e.g. 4.25">
                    </div>
                    <div class="input-group">
                        <label>Semester 1 Total Units</label>
                        <input type="number" class="sem-units" placeholder="e.g. 24">
                    </div>
                </div>
            </div>
            
            <button class="btn btn-secondary" onclick="addSemester()">+ Add Another Semester</button>
            <button class="btn btn-primary" onclick="calculateCGPA()">Calculate CGPA</button>
            
            <div id="cgpa-result" class="result-box hidden">
                <h4>Your CGPA</h4>
                <div class="value" id="cgpa-value">0.00</div>
                <div class="label">Cumulative Grade Point Average</div>
                <div class="message" id="cgpa-message"></div>
            </div>
        </div>
    </div>

    <script>
        let semesterCount = 1;
        
        function addSemester() {
            semesterCount++;
            const container = document.getElementById('semesters');
            const div = document.createElement('div');
            div.className = 'semester-block';
            div.innerHTML = `
                <h4>Semester ${semesterCount}</h4>
                <div class="input-group">
                    <label>Semester ${semesterCount} GPA</label>
                    <input type="number" step="0.01" min="0" max="5" class="sem-gpa" placeholder="e.g. 4.25">
                </div>
                <div class="input-group">
                    <label>Semester ${semesterCount} Total Units</label>
                    <input type="number" class="sem-units" placeholder="e.g. 24">
                </div>
            `;
            container.appendChild(div);
        }

        function calculateCGPA() {
            const gpas = document.querySelectorAll('.sem-gpa');
            const units = document.querySelectorAll('.sem-units');
            let totalPoints = 0, totalUnits = 0;
            let validSemesters = 0;

            for (let i = 0; i < gpas.length; i++) {
                const gpa = parseFloat(gpas[i].value);
                const unit = parseFloat(units[i].value);
                if (!isNaN(gpa) && !isNaN(unit) && unit > 0) {
                    totalPoints += gpa * unit;
                    totalUnits += unit;
                    validSemesters++;
                }
            }

            const resultBox = document.getElementById('cgpa-result');
            const valueEl = document.getElementById('cgpa-value');
            const messageEl = document.getElementById('cgpa-message');

            if (validSemesters === 0) {
                messageEl.textContent = 'Please enter at least one semester with GPA and units.';
                messageEl.className = 'message error';
                resultBox.classList.remove('hidden');
                valueEl.textContent = '0.00';
                return;
            }

            const cgpa = totalUnits > 0 ? (totalPoints / totalUnits) : 0;
            valueEl.textContent = cgpa.toFixed(2);

            let classification = '';
            if (cgpa >= 4.50) classification = 'First Class Honours 🏆';
            else if (cgpa >= 3.50) classification = 'Second Class Upper 🥇';
            else if (cgpa >= 2.40) classification = 'Second Class Lower';
            else if (cgpa >= 1.50) classification = 'Third Class';
            else classification = 'Pass';

            messageEl.innerHTML = `${validSemesters} semester(s) | Total Units: ${totalUnits} | ${classification}`;
            messageEl.className = 'message success';
            resultBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
